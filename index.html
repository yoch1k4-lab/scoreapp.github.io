<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Keeper</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior: none;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Animasi Mic Berkedip */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-listening {
            animation: pulse-red 1.5s infinite;
            background-color: #EF4444 !important;
            color: white !important;
        }
    </style>

    <!-- Firebase SDK ES Modules Loader Helper -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Expose Firebase SDK to window so Babel script can easily use it
        window.FirebaseSDK = {
            initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, deleteDoc
        };
    </script>
</head>
<body class="bg-[#E9E4F5]">
    <div id="root"></div>

    <script type="text/babel">
        const PREFILLED_SHEET_URL = "https://script.google.com/macros/s/AKfycbxE8yRWM5hCfvbQfKSdEf7rpKo-yd8vHZrV_U_BFLV44emVWTyu3joi78bbnODjusM/exec"; 
        const SPOTIFY_CLIENT_ID = "0ecec814727b4c4da8ac274dd9e8ca74"; 
        const SPOTIFY_CLIENT_SECRET = "d977b68913344e36abd42b9467b694ac";

        // Data URI untuk suara kosong (silence) berdurasi pendek. 
        const SILENT_AUDIO_URI = "data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIAD+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+AAAAAExhdmM1OC41NAAAAAAAAAAAAAAAACQAAAAAAAAAAAEgSbL2AAAAAAAAAAAA//MUXxAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//MUXxAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//MUXxAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//MUXxAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq";
        const SPOTIFY_EMBED_URL = 'https://open.spotify.com/embed/playlist/6dio66Z2ZaPAj4ZtoJFsoz';
        const SPOTIFY_URI = 'spotify:playlist:6dio66Z2ZaPAj4ZtoJFsoz';

        const { useState, useEffect, useCallback, useRef } = React;

        const DEFAULT_PLAYERS = ['Jambul', 'Dado', 'Demplon', 'Kinoy'];
        const DATA_KEY = '@scoreKeeperData_web';
        const BACKUP_KEY = '@scoreKeeperBackup_web';
        const REDO_KEY = '@scoreKeeperRedo_web';
        const HISTORY_KEY = '@scoreKeeperHistory_web';
        const WIN_HISTORY_KEY = '@scoreKeeperWinHistory_web'; 
        const PLAYER_KEY = '@scoreKeeperPlayers_web';
        const SHEETS_KEY = '@scoreKeeperSheets_web'; 

        const getInitialData = (players = DEFAULT_PLAYERS) => {
            const data = {};
            players.forEach(player => {
                data[player] = { patokan_normal: 0, patokan_joker: 0, skor: 0 };
            });
            return data;
        };

        const CustomSwitch = ({ value, onValueChange, disabled }) => (
            <button
                type="button"
                onClick={() => !disabled && onValueChange(!value)}
                className={`relative inline-flex items-center h-6 rounded-full w-11 transition-colors ${
                    value ? 'bg-[#5D3FD3]' : 'bg-gray-300'
                } ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`}
                disabled={disabled}
            >
                <span className={`inline-block w-4 h-4 transform bg-white rounded-full transition-transform ${
                    value ? 'translate-x-6' : 'translate-x-1'
                }`} />
            </button>
        );

        const Modal = ({ isVisible, onClose, title, children }) => {
            if (!isVisible) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl p-6 shadow-xl max-h-[80vh] w-full max-w-md flex flex-col" onClick={e => e.stopPropagation()}>
                        <h2 className="text-2xl font-bold mb-4 text-center">{title}</h2>
                        <div className="overflow-y-auto flex-grow">{children}</div>
                        <button onClick={onClose} className="w-full bg-[#5D3FD3] text-white font-bold py-3 px-4 rounded-lg mt-4 hover:bg-[#4B0082] transition-colors">Tutup</button>
                    </div>
                </div>
            );
        };

        const ConfirmationModal = ({ isOpen, title, message, onConfirm, onClose }) => {
            if (!isOpen) return null;
            const handleConfirm = () => {
                onClose(); 
                onConfirm(); 
            };
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
                    <div className="bg-white rounded-2xl p-6 shadow-xl w-full max-w-sm" onClick={e => e.stopPropagation()}>
                        <h2 className="text-xl font-bold mb-2 text-center">{title}</h2>
                        <p className="text-gray-600 mb-6 text-center">{message}</p>
                        <div className="flex justify-center gap-4">
                            <button onClick={onClose} className="flex-1 bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300">Batal</button>
                            <button onClick={handleConfirm} className="flex-1 bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700">YA</button>
                        </div>
                    </div>
                </div>
            );
        };

        const SidebarMenu = ({ 
            isOpen, onClose, 
            isVoiceEnabled, onToggleVoice, 
            voiceAlertsEnabled, onToggleVoiceAlerts,
            onShowHistory, onShowDebug,
            onEditScores, onEditPlayers, onEditStakes, onSaveToSheet
        }) => {
            return (
                <>
                    {isOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity" onClick={onClose}></div>
                    )}
                    <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl z-50 transform transition-transform duration-300 ease-in-out flex flex-col ${isOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-[#F6F4FC]">
                            <h2 className="text-xl font-bold text-[#4B0082]">☰ Menu Fitur</h2>
                            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-200 text-gray-800 hover:bg-red-500 hover:text-white transition-colors font-bold">✕</button>
                        </div>
                        
                        <div className="p-5 overflow-y-auto flex-1 flex flex-col gap-4">
                            <div>
                                <p className="text-sm font-bold text-gray-500 mb-2 uppercase">Audio & Notifikasi</p>
                                <button onClick={onToggleVoice} className="w-full flex items-center justify-between bg-gray-50 p-3 rounded-lg border border-gray-200 hover:bg-gray-100 mb-2">
                                    <span className="font-semibold text-gray-700">Feedback Suara</span>
                                    <span className="text-xl">{isVoiceEnabled ? '🔊 ON' : '🔇 OFF'}</span>
                                </button>
                                <button onClick={onToggleVoiceAlerts} className="w-full flex items-center justify-between bg-gray-50 p-3 rounded-lg border border-gray-200 hover:bg-gray-100">
                                    <span className="font-semibold text-gray-700">Suara Peringatan</span>
                                    <span className="text-xl">{voiceAlertsEnabled ? '🔔 ON' : '🔕 OFF'}</span>
                                </button>
                            </div>

                            <div>
                                <p className="text-sm font-bold text-gray-500 mb-2 uppercase">Data & Riwayat</p>
                                <button onClick={() => { onClose(); onShowHistory(); }} className="w-full text-left bg-gray-50 p-3 rounded-lg border border-gray-200 hover:bg-purple-50 hover:border-purple-200 font-semibold text-gray-700 mb-2">
                                    📜 Riwayat Kemenangan
                                </button>
                                <button onClick={() => { onClose(); onShowDebug(); }} className="w-full text-left bg-gray-50 p-3 rounded-lg border border-gray-200 hover:bg-purple-50 hover:border-purple-200 font-semibold text-gray-700 mb-2">
                                    🐞 Debug Skor
                                </button>
                                <button onClick={() => { onClose(); onSaveToSheet(); }} className="w-full text-left bg-green-50 text-green-700 p-3 rounded-lg border border-green-200 hover:bg-green-100 font-semibold">
                                    ☁️ Simpan ke Google Sheet
                                </button>
                            </div>

                            <div>
                                <p className="text-sm font-bold text-gray-500 mb-2 uppercase">Pengaturan Permainan</p>
                                <button onClick={() => { onClose(); onEditScores(); }} className="w-full text-left bg-gray-50 p-3 rounded-lg border border-gray-200 hover:bg-gray-100 font-semibold text-gray-700 mb-2">
                                    ✏️ Edit Skor Manual
                                </button>
                                <button onClick={() => { onClose(); onEditPlayers(); }} className="w-full text-left bg-gray-50 p-3 rounded-lg border border-gray-200 hover:bg-gray-100 font-semibold text-gray-700 mb-2">
                                    👥 Edit Pemain
                                </button>
                                <button onClick={() => { onClose(); onEditStakes(); }} className="w-full text-left bg-gray-50 p-3 rounded-lg border border-gray-200 hover:bg-gray-100 font-semibold text-gray-700">
                                    ⚙️ Edit Patokan Poin
                                </button>
                            </div>
                        </div>
                    </div>
                </>
            );
        };

        const getStack = (key) => {
            try {
                const item = localStorage.getItem(key);
                if (!item) return [];
                const parsed = JSON.parse(item);
                return Array.isArray(parsed) ? parsed : [];
            } catch (e) {
                return [];
            }
        };

        const DebugModal = ({ isVisible, onClose, info }) => (
            <Modal isVisible={isVisible} onClose={onClose} title="🐞 Debug Skor">
                <div dangerouslySetInnerHTML={{ __html: info }} className="text-sm text-gray-700 space-y-1 bg-gray-50 p-3 rounded-lg border border-gray-200" />
            </Modal>
        );

        const EditScoresModal = ({ isVisible, onClose, data, players, onSave }) => {
            const [editData, setEditData] = useState({});
            useEffect(() => {
                if (isVisible && data) {
                    const initData = {};
                    players.forEach(p => initData[p] = data[p].skor);
                    setEditData(initData);
                }
            }, [isVisible, data, players]);

            return (
                <Modal isVisible={isVisible} onClose={onClose} title="✏️ Edit Skor Manual">
                    <div className="space-y-4">
                        {players.map(p => (
                            <div key={p} className="flex flex-col">
                                <label className="font-bold text-gray-700 text-sm mb-1">{p}</label>
                                <input type="number" step="0.01" value={editData[p] !== undefined ? editData[p] : ''} onChange={e => setEditData({...editData, [p]: e.target.value})} className="border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-[#5D3FD3] focus:border-[#5D3FD3] outline-none transition-all" />
                            </div>
                        ))}
                        <button onClick={() => onSave(editData)} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl mt-2 transition-colors shadow-lg">Simpan Skor</button>
                    </div>
                </Modal>
            );
        };

        const EditPlayersModal = ({ isVisible, onClose, players, onSave }) => {
            const [tempPlayers, setTempPlayers] = useState([]);
            useEffect(() => {
                if (isVisible) setTempPlayers([...players]);
            }, [isVisible, players]);

            const handleUpdateTempPlayer = (index, value) => {
                const updated = [...tempPlayers];
                updated[index] = value;
                setTempPlayers(updated);
            };

            const handleAddPlayer = () => setTempPlayers([...tempPlayers, `Pemain ${tempPlayers.length + 1}`]);
            const handleRemovePlayer = (index) => setTempPlayers(tempPlayers.filter((_, i) => i !== index));

            return (
                <Modal isVisible={isVisible} onClose={onClose} title="👥 Edit Pemain">
                    <div className="space-y-3 max-h-[50vh] overflow-y-auto p-1">
                        {tempPlayers.map((p, index) => (
                            <div key={index} className="flex gap-2 items-center">
                                <input type="text" value={p} onChange={e => handleUpdateTempPlayer(index, e.target.value)} className="flex-1 border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-[#5D3FD3] outline-none" placeholder="Nama Pemain" />
                                {tempPlayers.length > 2 && (
                                    <button onClick={() => handleRemovePlayer(index)} className="bg-red-100 text-red-600 p-3 rounded-lg hover:bg-red-200 font-bold transition-colors">✕</button>
                                )}
                            </div>
                        ))}
                    </div>
                    <button onClick={handleAddPlayer} className="w-full mt-3 bg-blue-50 text-blue-600 border border-blue-200 font-bold py-3 rounded-xl hover:bg-blue-100 transition-colors">+ Tambah Pemain</button>
                    <button onClick={() => onSave(tempPlayers)} className="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-colors">Simpan Perubahan</button>
                </Modal>
            );
        };
        
        const EditStakesModal = ({ isVisible, onClose, data, players, onSave }) => {
            const [stakes, setStakes] = useState({});
            useEffect(() => {
                if (isVisible && data) {
                    const initData = {};
                    players.forEach(p => initData[p] = { n: data[p].patokan_normal, j: data[p].patokan_joker });
                    setStakes(initData);
                }
            }, [isVisible, data, players]);

            return (
                <Modal isVisible={isVisible} onClose={onClose} title="⚙️ Set Patokan Poin">
                    <div className="space-y-4">
                        {players.map(p => (
                            <div key={p} className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                <p className="font-bold text-[#4B0082] mb-2">{p}</p>
                                <div className="flex gap-2">
                                    <div className="flex-1">
                                        <label className="text-xs text-gray-500 font-semibold">Normal (N)</label>
                                        <input type="number" min="0" value={stakes[p]?.n ?? ''} onChange={e => setStakes({...stakes, [p]: {...stakes[p], n: e.target.value}})} className="w-full border border-gray-300 p-2 rounded-lg mt-1 outline-none focus:border-[#5D3FD3]" />
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-xs text-red-500 font-semibold">Joker (J)</label>
                                        <input type="number" min="0" value={stakes[p]?.j ?? ''} onChange={e => setStakes({...stakes, [p]: {...stakes[p], j: e.target.value}})} className="w-full border border-gray-300 p-2 rounded-lg mt-1 outline-none focus:border-red-500" />
                                    </div>
                                </div>
                            </div>
                        ))}
                        <button onClick={() => { onSave(stakes); onClose(); }} className="w-full bg-green-600 text-white font-bold py-3 rounded-xl mt-4 shadow-lg hover:bg-green-700">Simpan Patokan</button>
                    </div>
                </Modal>
            );
        };

        const GoogleSheetsModal = ({ isVisible, onClose, currentUrl, onSaveUrl, onSync, setNotification }) => {
            const [url, setUrl] = useState(currentUrl);
            useEffect(() => { setUrl(currentUrl); }, [currentUrl, isVisible]);
            
            return (
                <Modal isVisible={isVisible} onClose={onClose} title="☁️ Google Sheets Sync">
                    <div className="space-y-4">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">Web App URL</label>
                            <input type="text" value={url} onChange={e => setUrl(e.target.value)} placeholder="https://script.google.com/..." className="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-[#5D3FD3] outline-none text-sm" />
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => onSaveUrl(url)} className="flex-1 bg-blue-50 text-blue-600 font-bold py-2 rounded-lg border border-blue-200">Simpan URL</button>
                            <button onClick={() => onSync(url)} className="flex-1 bg-green-600 text-white font-bold py-2 rounded-lg shadow">Sinkronkan</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const ScoreTable = ({ data, players }) => {
            if (!data) return null;
            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 mb-6 relative">
                    <div className="overflow-x-auto">
                        <table className="w-full text-center">
                            <thead className="bg-[#F6F4FC] border-b border-gray-200">
                                <tr>
                                    <th className="py-4 px-3 font-extrabold text-[#4B0082] uppercase tracking-wider text-sm text-left">Pemain</th>
                                    <th className="py-4 px-3 font-extrabold text-[#4B0082] uppercase tracking-wider text-sm">Skor</th>
                                    <th className="py-4 px-3 font-extrabold text-gray-500 uppercase tracking-wider text-xs">N</th>
                                    <th className="py-4 px-3 font-extrabold text-red-500 uppercase tracking-wider text-xs">J</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {players.map((p, idx) => {
                                    const score = Math.round(data[p]?.skor ?? 0);
                                    const isNegative = score < 0;
                                    const isPositive = score > 0;
                                    return (
                                        <tr key={p} className={`${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'} hover:bg-purple-50 transition-colors`}>
                                            <td className="py-3 px-3 font-bold text-gray-800 text-left whitespace-nowrap">{p}</td>
                                            <td className="py-3 px-3">
                                                <span className={`inline-block font-black text-lg ${isNegative ? 'text-red-600' : isPositive ? 'text-green-600' : 'text-gray-500'}`}>
                                                    {score}
                                                </span>
                                            </td>
                                            <td className="py-3 px-3 text-sm text-gray-600 font-semibold">{data[p]?.patokan_normal ?? 0}</td>
                                            <td className="py-3 px-3 text-sm text-red-500 font-semibold">{data[p]?.patokan_joker ?? 0}</td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const WinSection = ({ players, onUpdateScore, onUpdateTeamScore, setNotification }) => {
            const [selectedWinners, setSelectedWinners] = useState([]);
            const [isJoker, setIsJoker] = useState(false);
            const [isWin2, setIsWin2] = useState(false);
            const [jokerHolders, setJokerHolders] = useState([]);
            const [buyers, setBuyers] = useState([]);
            const [buyDropdownOpen, setBuyDropdownOpen] = useState(null);
            
            const isTeamWin = selectedWinners.length > 1;

            const toggleWinner = (p) => {
                if (selectedWinners.includes(p)) setSelectedWinners(selectedWinners.filter(w => w !== p));
                else setSelectedWinners([...selectedWinners, p]);
            };

            const toggleJokerHolder = (p) => {
                if (jokerHolders.includes(p)) setJokerHolders(jokerHolders.filter(h => h !== p));
                else setJokerHolders([...jokerHolders, p]);
            };

            const handleSelectBuyAmount = (p, amount) => {
                let newBuyers = buyers.filter(b => b.name !== p);
                if (amount > 0) {
                    newBuyers.push({ name: p, amount });
                }
                setBuyers(newBuyers);
            };

            const handleSubmit = () => {
                if (selectedWinners.length === 0) {
                    setNotification({message: "Pilih minimal 1 pemenang!", type: "error"}); return;
                }
                
                const intersection = jokerHolders.filter(h => selectedWinners.includes(h));
                if (intersection.length > 0) {
                    setNotification({message: "Pemenang tidak bisa kena penalti Joker!", type: "error"}); return;
                }

                if (isTeamWin) {
                    onUpdateTeamScore(selectedWinners, jokerHolders, buyers);
                } else {
                    onUpdateScore(selectedWinners[0], isJoker, isWin2, jokerHolders, buyers);
                }

                setSelectedWinners([]);
                setIsJoker(false);
                setIsWin2(false);
                setJokerHolders([]);
                setBuyers([]);
                setBuyDropdownOpen(null);
            };

            return (
                <div className="bg-white rounded-2xl p-5 mb-5 shadow-lg border border-gray-100">
                    <h2 className="text-xl font-bold mb-4 text-[#4B0082] flex items-center gap-2">🏆 Catat Kemenangan</h2>
                    
                    <div className="mb-5">
                        <label className="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">1. Pilih Pemenang {selectedWinners.length > 1 ? '(Tim)' : ''}</label>
                        <div className="flex flex-wrap gap-2">
                            {players.map(p => (
                                <button key={p} onClick={() => toggleWinner(p)} className={`px-4 py-2 rounded-xl font-bold transition-all shadow-sm ${selectedWinners.includes(p) ? 'bg-[#5D3FD3] text-white ring-2 ring-purple-300 ring-offset-1' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                                    {p}
                                </button>
                            ))}
                        </div>
                    </div>

                    {!isTeamWin && selectedWinners.length === 1 && (
                        <div className="mb-5 bg-[#F6F4FC] p-4 rounded-xl border border-purple-100 flex gap-4">
                            <label className="flex items-center gap-2 cursor-pointer flex-1 justify-center">
                                <CustomSwitch value={isJoker} onValueChange={setIsJoker} disabled={isWin2} />
                                <span className={`font-bold text-sm ${isWin2 ? 'text-gray-400' : 'text-gray-800'}`}>Win Joker</span>
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer flex-1 justify-center">
                                <CustomSwitch value={isWin2} onValueChange={setIsWin2} disabled={isJoker} />
                                <span className={`font-bold text-sm ${isJoker ? 'text-gray-400' : 'text-gray-800'}`}>Win Langsung (x2)</span>
                            </label>
                        </div>
                    )}

                    {selectedWinners.length > 0 && (
                        <div className="mb-5 border-t border-gray-100 pt-4">
                            <label className="block text-sm font-bold text-red-600 mb-2 uppercase tracking-wide">3. Opsi Tambahan (Penalti & Beli)</label>
                            <div className="space-y-3">
                                {players.map(p => {
                                    const isWinner = selectedWinners.includes(p);
                                    const isJokerDisabled = isWinner;
                                    const b = buyers.find(x => x.name === p);
                                    const currentBuyAmount = b ? b.amount : 0;
                                    return (

        const JokerTransferSection = ({ players, onJokerTransfer }) => {

        const SpotifyPlayer = ({ embedUrl, spotifyUri, onControllerReady, isPlaying, setIsPlaying, isVisible, onClose }) => {
            useEffect(() => {
                window.onSpotifyIframeApiReady = (IFrameAPI) => {
                    const element = document.getElementById('spotify-iframe');
                    const options = { width: '100%', height: '100%', uri: spotifyUri };
                    const callback = (EmbedController) => {
                        onControllerReady(EmbedController);
                        EmbedController.addListener('playback_update', e => {
                            if (e.data.isPaused) setIsPlaying(false);
                            else setIsPlaying(true);
                        });
                    };
                    IFrameAPI.createController(element, options, callback);
                };

                const script = document.createElement('script');
                script.src = 'https://open.spotify.com/embed/iframe-api/v1';
                script.async = true;
                document.body.appendChild(script);

                return () => { document.body.removeChild(script); };
            }, [spotifyUri, onControllerReady, setIsPlaying]);

            return (
                <div className={`fixed inset-0 z-50 flex items-end justify-center pointer-events-none transition-opacity duration-300 ${isVisible ? 'opacity-100' : 'opacity-0'}`}>

                    <div className={`w-full max-w-md bg-[#121212] rounded-t-2xl shadow-2xl pointer-events-auto transform transition-transform duration-300 flex flex-col ${isVisible ? 'translate-y-0' : 'translate-y-full'}`} style={{ height: '70vh' }}>
                        <div className="flex justify-between items-center p-4 border-b border-gray-800">
                            <h3 className="text-white font-bold text-lg flex items-center gap-2"><span className="text-[#1DB954]">Spotify</span> Player</h3>
                            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">✕</button>
                        </div>
                        <div className="flex-1 p-2 w-full h-full relative">
                            <div id="spotify-iframe" className="w-full h-full rounded-xl"></div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [players, setPlayers] = useState(DEFAULT_PLAYERS);
            const [data, setData] = useState(null);
            const [notification, setNotificationRaw] = useState({ message: 'Welcome! Gunakan fitur Voice untuk mencatat skor otomatis.', type: 'info' });
            
            const [historyModalVisible, setHistoryModalVisible] = useState(false);
            const [winHistory, setWinHistory] = useState([]); 
            
            const [editModalVisible, setEditModalVisible] = useState(false);
            const [editPlayersModalVisible, setEditPlayersModalVisible] = useState(false);
            const [editStakesModalVisible, setEditStakesModalVisible] = useState(false);
            const [sheetModalVisible, setSheetModalVisible] = useState(false); 
            const [debugModalVisible, setDebugModalVisible] = useState(false);
            const [debugInfo, setDebugInfo] = useState('');
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: () => {} });
            
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const audioRef = useRef(null);
            const audioCtxRef = useRef(null);

            // Voice State
            const [isVoiceEnabled, setIsVoiceEnabled] = useState(true);
            const [isListening, setIsListening] = useState(false);
            const [voiceTranscript, setVoiceTranscript] = useState('');
            const [voiceAlertsEnabled, setVoiceAlertsEnabled] = useState(true);

            const [sheetUrl, setSheetUrl] = useState('');
            const [consecutiveDemplonWins, setConsecutiveDemplonWins] = useState(0);
            const [consecutiveDadoWins, setConsecutiveDadoWins] = useState(0);
            const [consecutiveJambulWins, setConsecutiveJambulWins] = useState(0);
            const [consecutiveKinoyWins, setConsecutiveKinoyWins] = useState(0);

            // Spotify Integration States
            const [isSpotifyPlaying, setIsSpotifyPlaying] = useState(false);
            const [showSpotify, setShowSpotify] = useState(false); 
            const spotifyControllerRef = useRef(null);
            const wasSpotifyPlayingRef = useRef(false);
            const ttsActiveRef = useRef(false);
            const currentUtteranceIdRef = useRef(null);

            // Firebase/Database State
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);

            const setNotification = useCallback((notif) => {
                setNotificationRaw(notif);
                if (notif && notif.message) {
                    window.scrollTo({top: 0, behavior: 'smooth'}); 
                    setTimeout(() => {
                        setNotificationRaw({ message: '', type: notif.type || 'info' });
                    }, 3000);
                }
            }, []);

            useEffect(() => {
                const initFirebase = async () => {
                    if (typeof window.FirebaseSDK === 'undefined') {
                        setTimeout(initFirebase, 200);
                        return;
                    }
                    try {
                        const { initializeApp, getAuth, getFirestore, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                        
                        let firebaseConfig = null;
                        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                            try {
                                firebaseConfig = typeof __firebase_config === 'string' 
                                    ? JSON.parse(__firebase_config) 
                                    : __firebase_config;
                            } catch (e) {
                                console.error("Gagal parse __firebase_config:", e);
                            }
                        }
                        
                        if (!firebaseConfig) {
                            console.warn("Kunci Firebase tidak terdeteksi. Beralih ke Mode Simulasi Cepat.");
                            setupMockFirebase();
                            return;
                        }
                        
                        const app = initializeApp(firebaseConfig);
                        const authInstance = getAuth(app);
                        const dbInstance = getFirestore(app);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(authInstance, __initial_auth_token);
                            } catch (tokenErr) {
                                console.warn("Custom token gagal, beralih ke Anonim:", tokenErr);
                                await signInAnonymously(authInstance);
                            }
                        } else {
                            await signInAnonymously(authInstance);
                        }

                        setDb(dbInstance);
                        setAuth(authInstance);
                        
                        onAuthStateChanged(authInstance, (u) => {
                            if (u) {
                                setUser(u);
                                setFirebaseReady(true);
                                console.log("Firebase Terhubung & Terautentikasi.");
                            } else {
                                setFirebaseReady(false);
                            }
                        });
                    } catch (e) {
                        console.error("Kesalahan inisialisasi cloud: ", e);
                        setupMockFirebase();
                    }
                };

                const setupMockFirebase = () => {
                    const mockDbInstance = { isMock: true };
                    setDb(mockDbInstance);
                    setFirebaseReady(true);
                    setUser({ uid: 'mock-user-id', isAnonymous: true });
                    console.log("Simulator Room Multi-Tab Aktif.");
                };

                initFirebase();
            }, []);

            const speak = useCallback((text) => {
                if (isVoiceEnabled && 'speechSynthesis' in window) {
                    if (!audioCtxRef.current) {
                        try { audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
                    }
                    let osc = null;
                    if (audioCtxRef.current) {
                        const ctx = audioCtxRef.current;
                        if (ctx.state === 'suspended') ctx.resume();
                        try {
                            osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            gain.gain.value = 0; 
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start();
                        } catch(e) {}
                    }

                    if (audioRef.current) {
                        audioRef.current.play().catch(e => console.log("Silent fallback fail:", e));
                    }

                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.playbackState = 'playing';
                    }

                    window.speechSynthesis.cancel();
                    const utteranceId = Math.random();
                    currentUtteranceIdRef.current = utteranceId;

                    if (!ttsActiveRef.current) {
                        if (isSpotifyPlaying && spotifyControllerRef.current) {
                            wasSpotifyPlayingRef.current = true;
                            spotifyControllerRef.current.pause();
                        } else {
                            wasSpotifyPlayingRef.current = false;
                        }
                    }
                    ttsActiveRef.current = true;

                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'id-ID'; 
                    
                    const stopFocus = () => {
                        if (currentUtteranceIdRef.current !== utteranceId) return;

                        if (osc) {
                            try { osc.stop(); } catch(e) {}
                        }
                        if (audioRef.current) {
                            audioRef.current.pause();
                            audioRef.current.currentTime = 0;
                        }
                        if ('mediaSession' in navigator) {
                            navigator.mediaSession.playbackState = 'none';
                        }

                        ttsActiveRef.current = false;

                        if (wasSpotifyPlayingRef.current && spotifyControllerRef.current) {
                            setTimeout(() => {
                                if (currentUtteranceIdRef.current === utteranceId && spotifyControllerRef.current) {
                                    if (typeof spotifyControllerRef.current.resume === 'function') {
                                        spotifyControllerRef.current.resume();
                                    } else {
                                        spotifyControllerRef.current.play();
                                    }
                                    wasSpotifyPlayingRef.current = false;
                                }
                            }, 800); 
                        }
                    };

                    utterance.onend = stopFocus;
                    utterance.onerror = stopFocus;

                    window.speechSynthesis.speak(utterance);
                }
            }, [isVoiceEnabled, isSpotifyPlaying]);

            useEffect(() => {
                try {
                    const jsonPlayers = localStorage.getItem(PLAYER_KEY);
                    const loadedPlayers = jsonPlayers ? JSON.parse(jsonPlayers) : DEFAULT_PLAYERS;
                    setPlayers(loadedPlayers);
                    
                    const jsonData = localStorage.getItem(DATA_KEY);
                    setData(jsonData ? JSON.parse(jsonData) : getInitialData(loadedPlayers));
                    
                    const savedSheetUrl = localStorage.getItem(SHEETS_KEY);
                    setSheetUrl(savedSheetUrl || PREFILLED_SHEET_URL || '');

                    const savedWinHistory = localStorage.getItem(WIN_HISTORY_KEY);
                    setWinHistory(savedWinHistory ? JSON.parse(savedWinHistory) : []);
                } catch (e) {
                    setPlayers(DEFAULT_PLAYERS);
                    setData(getInitialData(DEFAULT_PLAYERS));
                    setWinHistory([]);
                }
            }, []);

            const saveData = useCallback((newData, backupCurrent = true) => {
                try {
                    if (backupCurrent && data) {
                        let undoStack = getStack(BACKUP_KEY);
                        undoStack.push(data);
                        if (undoStack.length > 5) undoStack.shift();
                        localStorage.setItem(BACKUP_KEY, JSON.stringify(undoStack));
                        localStorage.removeItem(REDO_KEY);
                    }
                    localStorage.setItem(DATA_KEY, JSON.stringify(newData));
                    setData(newData);
                } catch (e) {
                    setNotification({ message: 'Error saving data!', type: 'error' });
                }
            }, [data, setNotification]);

            const handleSaveSheetUrl = (url) => { setSheetUrl(url); localStorage.setItem(SHEETS_KEY, url); };
            
            const handleSyncToSheets = async (targetUrl) => {
                if (!data) return;
                const scoresMap = {};
                players.forEach(p => scoresMap[p] = data[p].skor);
                const payload = { players: players, scores: scoresMap };
                try {
                    await fetch(targetUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    setNotification({ message: '✅ Data terkirim ke Google Sheet!', type: 'success' });
                    setSheetModalVisible(false);
                } catch (error) {
                    setNotification({ message: '❌ Gagal mengirim. Cek URL atau koneksi.', type: 'error' });
                }
            };

            const logHistory = useCallback((text) => {
                const time = new Date().toLocaleString('id-ID', { hour12: false });
                const newEntry = `[${time}] ${text}`;
                const currentHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                const updatedHistory = [newEntry, ...currentHistory].slice(50);
                localStorage.setItem(HISTORY_KEY, JSON.stringify(updatedHistory));
            }, []);

            const addWinToHistory = useCallback((winDetails) => {
                const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const newEntry = { time, detail: winDetails };
                setWinHistory(prev => {
                    const updated = [newEntry, ...prev].slice(0, 10);
                    localStorage.setItem(WIN_HISTORY_KEY, JSON.stringify(updated));
                    return updated;
                });
            }, []);

            const handleUpdateScore = (winner, isJoker, isWin2, jokerHolders = [], buyers = []) => {
                if (!data) return;
                const newData = JSON.parse(JSON.stringify(data));
                const key = isJoker ? 'patokan_joker' : 'patokan_normal';
                
                for (const p of players) {
                    if (newData[p][key] <= 0) {
                        setNotification({message: `⚠️ Gagal! ${p} belum set nilai ${isJoker ? 'Joker' : 'Normal'}.`, type: 'error'});
                        return;
                    }
                }

                const losers = players.filter(p => p !== winner);
                let totalLoss = 0;

                losers.forEach(loser => {
                    const normalStake = newData[loser].patokan_normal;
                    const jokerStake = newData[loser].patokan_joker;
                    let baseLoss = newData[loser][key];
                    let jokerPenaltyCalc = jokerHolders.includes(loser) ? (jokerStake - normalStake) : 0;
                    const buyerInfo = buyers.find(b => b.name === loser);
                    let buyPenaltyCalc = buyerInfo ? buyerInfo.amount * normalStake : 0;
                    let loss = baseLoss + jokerPenaltyCalc + buyPenaltyCalc;
                    if (isWin2) loss *= 2;
                    newData[loser].skor -= loss;
                    totalLoss += loss;
                });

                newData[winner].skor += totalLoss;

                const totalCheck = players.reduce((sum, p) => sum + newData[p].skor, 0);
                if (Math.abs(totalCheck) > 0.01) {
                    setNotification({ message: `❌ Perubahan dibatalkan! Total skor tidak seimbang.`, type: 'error' });
                    return;
                }

                saveData(newData);
                let logMsg = `${winner} menang ronde ${isJoker ? 'joker' : 'biasa'}${isWin2 ? ' (x2)' : ''} (+${totalLoss.toFixed(2)})`;
                if (jokerHolders.length > 0) logMsg += `, penalti joker: ${jokerHolders.join(', ')}`;
                if (buyers.length > 0) logMsg += `, beli: ${buyers.map(b => `${b.name} ${b.amount}x`).join(', ')}`;
                
                logHistory(logMsg);
                addWinToHistory(logMsg); 
                setNotification({ message: `🎉 ${logMsg}`, type: 'success' });

                // Update consecutive counters
                let newDemplon = consecutiveDemplonWins;
                let newDado = consecutiveDadoWins;
                let newJambul = consecutiveJambulWins;
                let newKinoy = consecutiveKinoyWins;

                if (winner === 'Demplon') {
                    newDemplon = consecutiveDemplonWins + 1;
                    setConsecutiveDemplonWins(newDemplon);
                    if (consecutiveDadoWins !== 0) setConsecutiveDadoWins(0);
                    if (consecutiveJambulWins !== 0) setConsecutiveJambulWins(0);
                    if (consecutiveKinoyWins !== 0) setConsecutiveKinoyWins(0);
                } else if (winner === 'Dado') {
                    newDado = consecutiveDadoWins + 1;
                    setConsecutiveDadoWins(newDado);
                    if (consecutiveDemplonWins !== 0) setConsecutiveDemplonWins(0);
                    if (consecutiveJambulWins !== 0) setConsecutiveJambulWins(0);
                    if (consecutiveKinoyWins !== 0) setConsecutiveKinoyWins(0);
                } else if (winner === 'Jambul') {
                    newJambul = consecutiveJambulWins + 1;
                    setConsecutiveJambulWins(newJambul);
                    if (consecutiveDemplonWins !== 0) setConsecutiveDemplonWins(0);
                    if (consecutiveDadoWins !== 0) setConsecutiveDadoWins(0);
                    if (consecutiveKinoyWins !== 0) setConsecutiveKinoyWins(0);
                } else if (winner === 'Kinoy') {
                    newKinoy = consecutiveKinoyWins + 1;
                    setConsecutiveKinoyWins(newKinoy);
                    if (consecutiveDemplonWins !== 0) setConsecutiveDemplonWins(0);
                    if (consecutiveDadoWins !== 0) setConsecutiveDadoWins(0);
                    if (consecutiveJambulWins !== 0) setConsecutiveJambulWins(0);
                } else {
                    if (consecutiveDemplonWins !== 0) setConsecutiveDemplonWins(0);
                    if (consecutiveDadoWins !== 0) setConsecutiveDadoWins(0);
                    if (consecutiveJambulWins !== 0) setConsecutiveJambulWins(0);
                    if (consecutiveKinoyWins !== 0) setConsecutiveKinoyWins(0);
                }

                let prefix = '';
                if (winner === 'Jambul') {
                    if (newJambul >= 3) prefix = 'hat trick cuy';
                    else if (newJambul === 2) prefix = 'yes jambul menang lagi';
                    else if (newJambul === 1) prefix = 'wah jambul menang';
                } else if (winner === 'Kinoy') {
                    if (newKinoy >= 3) prefix = 'cukup sampai disini dulu ya kinoy';
                    else if (newKinoy === 2) prefix = 'hebat kinoy menang lagi';
                    else if (newKinoy === 1) prefix = 'wah kinoy menang nih';
                } else if (winner === 'Dado') {
                    if (newDado >= 4) prefix = 'dado lagi dado lagi bosen ah';
                    else if (newDado === 3) prefix = 'demplon tolong stop dado';
                    else if (newDado === 2) prefix = 'biji kadut menang lagi';
                    else if (newDado === 1) prefix = 'dado menang nih';
                } else if (winner === 'Demplon') {
                    if (newDemplon >= 4) prefix = 'Demplon kamu sudah bole stop dulu';
                    else if (newDemplon === 3) prefix = 'Gile loe dro menang melulu';
                    else if (newDemplon === 2) prefix = 'ehem demplon menang lagi';
                    else if (newDemplon === 1) prefix = 'demplon menang nih';
                }

                const shortSpeech = `${winner} mendapatkan ${Math.round(totalLoss)} poin.`;
                if (prefix) {
                    if (voiceAlertsEnabled) {
                        speak(`${prefix}. ${shortSpeech}`);
                    }
                } else {
                    if (voiceAlertsEnabled) speak(shortSpeech);
                }
            };

            const handleUpdateTeamScore = (winners, jokerHolders = [], buyers = []) => {
                if (!data) return;
                let newData = JSON.parse(JSON.stringify(data));
                for (const p of players) {
                    if (newData[p].patokan_normal <= 0) {
                        setNotification({ message: `⚠️ Gagal! ${p} belum set nilai Normal.`, type: 'error' });
                        return;
                    }
                }
                const losers = players.filter(p => !winners.includes(p));
                const winnerBuyers = buyers.filter(b => winners.includes(b.name));
                const loserBuyers = buyers.filter(b => losers.includes(b.name));
                if (winnerBuyers.length > 1) {
                    setNotification({ message: `❌ Hanya satu pemenang yang boleh buy.`, type: 'error' }); return;
                }
                const totalNormalStake = players.reduce((sum, p) => sum + newData[p].patokan_normal, 0);
                const baseChange = totalNormalStake / players.length;
                let totalJokerPenalty = 0;
                jokerHolders.forEach(jh => { totalJokerPenalty += newData[jh].patokan_joker - newData[jh].patokan_normal; });
                let totalLoserBuyPenalty = 0;
                loserBuyers.forEach(b => { totalLoserBuyPenalty += b.amount * newData[b.name].patokan_normal; });
                
                losers.forEach(loser => {
                    let currentLoss = baseChange;
                    const jokerPenaltyCalc = jokerHolders.includes(loser) ? (newData[loser].patokan_joker - newData[loser].patokan_normal) : 0;
                    const buyerInfo = loserBuyers.find(b => b.name === loser);
                    const finalBuyPenalty = buyerInfo ? buyerInfo.amount * newData[loser].patokan_normal : 0;
                    currentLoss += jokerPenaltyCalc + finalBuyPenalty;
                    newData[loser].skor -= currentLoss;
                });
                
                const totalGainFromLosers = totalJokerPenalty + totalLoserBuyPenalty;
                const baseGainPerWinner = baseChange + (totalGainFromLosers / winners.length);
                
                if (winnerBuyers.length === 1 && winners.length === 2) {
                    const winnerBuyer = winnerBuyers[0];
                    const otherWinner = winners.find(w => w !== winnerBuyer.name);
                    const transferAmount = (newData[winnerBuyer.name].patokan_normal * winnerBuyer.amount) / winners.length;
                    newData[winnerBuyer.name].skor += baseGainPerWinner - transferAmount;
                    newData[otherWinner].skor += baseGainPerWinner + transferAmount;
                } else {
                    winners.forEach(winner => { newData[winner].skor += baseGainPerWinner; });
                }
                
                const totalCheck = players.reduce((sum, p) => sum + newData[p].skor, 0);
                if (Math.abs(totalCheck) > 0.01) {
                    setNotification({ message: `❌ Perubahan dibatalkan! Total skor tidak seimbang.`, type: 'error' }); return;
                }

                saveData(newData);
                let logMsg = `Tim ${winners.join(' & ')} menang (+${baseGainPerWinner.toFixed(0)} poin per pemain)`;
                if (jokerHolders.length > 0) logMsg += `, penalti joker: ${jokerHolders.join(', ')}`;
                if (buyers.length > 0) logMsg += `, beli: ${buyers.map(b => `${b.name} ${b.amount}x`).join(', ')}`;
                
                logHistory(logMsg);
                addWinToHistory(logMsg); 
                setNotification({ message: `🤝 ${logMsg}`, type: 'success' });

                const shortTeamSpeech = `${winners.join(' dan ')} mendapatkan ${Math.round(baseGainPerWinner)} poin.`;
                if (voiceAlertsEnabled) speak(shortTeamSpeech);
            };

            const speakCurrentScores = () => {
                if (!data) { setNotification({ message: 'Data belum tersedia untuk dibacakan.', type: 'error' }); return; }
                const scoreText = players.map(p => `${p} ${Math.round(data[p].skor)}`).join(', ');
                speak(`Skor saat ini: ${scoreText}`);
            };

            const handleJokerTransfer = (gainer, loser) => {
                if (!data) return false;
                if (!gainer || !loser || gainer === loser) {
                    setNotification({message: "Pilih 2 pemain yang berbeda.", type: 'error'}); return false;
                }
                const newData = JSON.parse(JSON.stringify(data));
                if (newData[loser].patokan_joker <= 0 || newData[loser].patokan_normal <= 0) {
                    setNotification({ message: `⚠️ Gagal! ${loser} belum set patokan.`, type: 'error'}); return false;
                }
                const transferAmount = newData[loser].patokan_joker - newData[loser].patokan_normal;
                newData[gainer].skor += transferAmount;
                newData[loser].skor -= transferAmount;
                saveData(newData);
                
                const logMsg = `Transfer joker dari ${loser} ke ${gainer} (${transferAmount.toFixed(2)} poin)`;
                logHistory(logMsg);
                setNotification({ message: `🃏 ${logMsg}`, type: 'success' });
                speak(`${loser} memasukkan Joker ke ${gainer}`);
                return true; 
            };

            const parseIndonesianNumber = (str) => {
                if (!str) return NaN;
                const map = {
                    'satu': 1, 'dua': 2, 'tiga': 3, 'empat': 4, 'lima': 5,
                    'enam': 6, 'tujuh': 7, 'delapan': 8, 'sembilan': 9, 'sepuluh': 10,
                    'sekali': 1
                };
                if (map[str] !== undefined) return map[str];
                const parsed = parseInt(str.replace(/[^0-9]/g, ''));
                return isNaN(parsed) ? NaN : parsed;
            };

            const processVoiceCommand = (text) => {
                const cleanText = text.replace(/[.,?!]/g, '').toLowerCase().trim();
                const words = cleanText.split(/\s+/);

                const getPlayer = (wordStr) => {
                    if (!wordStr) return null;
                    return players.find(p => p.toLowerCase() === wordStr || wordStr.includes(p.toLowerCase()) || p.toLowerCase().includes(wordStr));
                };

                if (cleanText.includes('masukin joker') || cleanText.includes('masukkan joker')) {
                    const delimiter = cleanText.includes('masukin joker') ? 'masukin joker' : 'masukkan joker';
                    const parts = cleanText.split(delimiter);
                    const loserStr = parts[0].trim().split(' ').pop();
                    const gainerStr = parts[1].trim().split(' ')[0];

                    const loser = getPlayer(loserStr);
                    const gainer = getPlayer(gainerStr);

                    if (gainer && loser) {
                        handleJokerTransfer(gainer, loser);
                        return;
                    }
                }

                if (cleanText.includes('win')) {
                    let isJoker = cleanText.includes('win joker');
                    let isWin2 = cleanText.includes('win langsung');
                    let winners = [];
                    let jokerHolders = [];
                    let buyers = [];

                    for (let i = 0; i < words.length; i++) {
                        const word = words[i];

                        if (word === 'win' && i > 0) {
                            const p = getPlayer(words[i-1]);
                            if (p && !winners.includes(p)) winners.push(p);
                        }

                        if (word === 'joker' && i > 0 && words[i-1] !== 'win' && words[i-1] !== 'masukin' && words[i-1] !== 'masukkan') {
                            const p = getPlayer(words[i-1]);
                            if (p && !jokerHolders.includes(p)) jokerHolders.push(p);
                        }

                        if (word === 'beli' && i > 0) {
                            const p = getPlayer(words[i-1]);
                            if (p) {
                                let amount = NaN;
                                const nextWord = words[i+1];
                                
                                if (nextWord === 'sekali') {
                                    amount = 1;
                                } else {
                                    const numValue = parseIndonesianNumber(nextWord);
                                    if (!isNaN(numValue)) {
                                        amount = numValue;
                                    }
                                }

                                if (!isNaN(amount)) {
                                    buyers.push({ name: p, amount: amount });
                                }
                            }
                        }
                    }

                    if (winners.length > 0) {
                        if (winners.length === 1) {
                            handleUpdateScore(winners[0], isJoker, isWin2, jokerHolders, buyers);
                        } else {
                            handleUpdateTeamScore(winners, jokerHolders, buyers);
                        }
                        return;
                    }
                }

                setNotification({message: "Format suara tidak dikenali: " + text, type: "error"});
            };

            const toggleListening = () => {
                if (isListening) {
                    setIsListening(false);
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setNotification({message: "Browser Anda tidak mendukung fitur Voice Recognition.", type: "error"});
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'id-ID';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    setIsListening(true);
                    setVoiceTranscript('🎤 Mendengarkan...');
                };

                recognition.onresult = (event) => {
                    const result = event.results[0][0].transcript;
                    setVoiceTranscript(`🔊 "${result}"`);
                    processVoiceCommand(result);
                };

                recognition.onerror = (event) => {
                    setNotification({message: "Error mikrofon: " + event.error, type: "error"});
                    setIsListening(false);
                    setVoiceTranscript('');
                };

                recognition.onend = () => {
                    setIsListening(false);
                    setTimeout(() => {
                        setVoiceTranscript(prev => prev.includes('Mendengarkan') ? '' : prev);
                    }, 4000);
                };

                recognition.start();
            };

            const handleResetScores = () => {
                setConfirmModal({
                    isOpen: true,
                    title: "Reset Skor?",
                    message: "Apakah Anda yakin ingin mereset semua skor pemain ke 0?",
                    onConfirm: () => {
                        if (!data) return;
                        const newData = JSON.parse(JSON.stringify(data));
                        players.forEach(p => (newData[p].skor = 0));
                        saveData(newData);
                        logHistory("Semua skor direset ke 0.");
                        setNotification({ message: "🔄 Semua skor berhasil direset ke 0.", type: 'success' });
                    }
                });
            };

            const handleResetStakes = () => {
                setConfirmModal({
                    isOpen: true,
                    title: "Reset Poin?",
                    message: "Apakah Anda yakin ingin mereset semua patokan poin (N & J) ke 0?",
                    onConfirm: () => {
                        if (!data) return;
                        const newData = JSON.parse(JSON.stringify(data));
                        players.forEach(p => { newData[p].patokan_normal = 0; newData[p].patokan_joker = 0; });
                        saveData(newData);
                        logHistory("Semua patokan poin direset ke 0.");
                        setNotification({ message: "🧮 Semua patokan poin berhasil direset.", type: 'success' });
                    }
                });
            };

            const handleUndo = () => {
                let undoStack = getStack(BACKUP_KEY);
                if (undoStack.length === 0) { setNotification({ message: "❌ Tidak ada riwayat untuk di-undo.", type: 'error' }); return; }
                const previousData = undoStack.pop();
                let redoStack = getStack(REDO_KEY);
                if (data) redoStack.push(data);
                localStorage.setItem(BACKUP_KEY, JSON.stringify(undoStack));
                localStorage.setItem(REDO_KEY, JSON.stringify(redoStack));
                localStorage.setItem(DATA_KEY, JSON.stringify(previousData));
                setData(previousData);
                logHistory("Perubahan terakhir dibatalkan (undo).");
                setNotification({ message: "↩️ Undo berhasil!", type: 'success' });
            };

            const handleRedo = () => {
                let redoStack = getStack(REDO_KEY);
                if (redoStack.length === 0) { setNotification({ message: "❌ Tidak ada perubahan untuk di-redo.", type: 'error' }); return; }
                const nextData = redoStack.pop();
                let undoStack = getStack(BACKUP_KEY);
                if (data) undoStack.push(data);
                localStorage.setItem(REDO_KEY, JSON.stringify(redoStack));
                localStorage.setItem(BACKUP_KEY, JSON.stringify(undoStack));
                localStorage.setItem(DATA_KEY, JSON.stringify(nextData));
                setData(nextData);
                logHistory("Perubahan terakhir diulang (redo).");
                setNotification({ message: "➡️ Redo berhasil!", type: 'success' });
            };

            const handleShowDebug = () => {
                let detail = "";
                try {
                    const undoStack = getStack(BACKUP_KEY);
                    const prevData = undoStack.length > 0 ? undoStack[undoStack.length - 1] : {};
                    const currData = JSON.parse(localStorage.getItem(DATA_KEY) || "{}");
                    detail += `<div class='font-bold mb-2'>Detail perubahan skor round terakhir:</div>`;
                    players.forEach(p => {
                        const prev = prevData[p]?.skor ?? 0;
                        const curr = currData[p]?.skor ?? 0;
                        const diff = (curr - prev).toFixed(2);
                        detail += `<div>${p}: <span style='color:${diff>0?'green':diff<0?'red':'#444'}'>${prev.toFixed(2)} ➔ ${curr.toFixed(2)} (${diff>0?'+':''}${diff})</span></div>`;
                    });
                } catch (e) { detail = "Gagal parsing data debug."; }
                setDebugInfo(detail);
                setDebugModalVisible(true);
            };

            const handleSaveScores = (editScores) => {
                let hasError = false;
                for (const p of players) {
                    const val = editScores[p];
                    if (val === undefined || val === null || val === '' || isNaN(parseFloat(val))) {
                        hasError = true;
                        break;
                    }
                }
                let totalCheck = 0;
                players.forEach(p => { 
                    totalCheck += (parseFloat(editScores[p]) || 0); 
                });
                if (Math.abs(totalCheck) > 0.01) {
                    hasError = true;
                }
                if (hasError) {
                    setNotification({ message: `❌ Input salah! Pastikan semua kolom terisi angka dan total akumulasi seluruh skor adalah 0.`, type: 'error' });
                    return;
                }
                const newData = JSON.parse(JSON.stringify(data));
                players.forEach(p => { newData[p].skor = parseFloat(editScores[p]); });
                saveData(newData);
                setNotification({message: "✏️ Skor berhasil diedit.", type: "success"});
                setEditModalVisible(false);
            };

            const handleSavePlayers = (editPlayers) => {
                let validPlayers = editPlayers.map(p => p.trim()).filter(p => p.length > 0);
                if (validPlayers.length < 2) { setNotification({message:"Minimal 2 pemain!", type:"error"}); return; }
                localStorage.setItem(PLAYER_KEY, JSON.stringify(validPlayers));
                setPlayers(validPlayers);
                let newData = getInitialData(validPlayers);
                validPlayers.forEach(p => { if (data && data[p]) newData[p] = {...data[p]}; });
                saveData(newData, false);
                setNotification({message: "✅ Nama & jumlah pemain berhasil diupdate!", type: "success"});
            };

            const handleSaveStakes = (stakes) => {
                const newData = JSON.parse(JSON.stringify(data));
                players.forEach(p => {
                    newData[p].patokan_normal = Math.round(parseFloat(stakes[p].n) || 0);
                    newData[p].patokan_joker = Math.round(parseFloat(stakes[p].j) || 0);
                });
                saveData(newData);
                setNotification({message: '✅ Nilai patokan berhasil diupdate!', type: 'success'});
            };

            const clearWinHistory = () => {
                setWinHistory([]);
                localStorage.removeItem(WIN_HISTORY_KEY);
                setNotification({ message: "🗑️ Riwayat kemenangan berhasil dibersihkan.", type: 'success' });
            };

            const notificationColors = {
                info: 'bg-blue-100 text-blue-800',
                success: 'bg-green-100 text-green-800',
                error: 'bg-red-100 text-red-800'
            };

            return (
                <div className="max-w-2xl mx-auto">
                    <audio ref={audioRef} src={SILENT_AUDIO_URI} playsInline preload="auto" loop />

                    {/* MODAL RIWAYAT KEMENANGAN */}
                    <Modal isVisible={historyModalVisible} onClose={() => setHistoryModalVisible(false)} title="📜 10 Kemenangan Terakhir">
                        {winHistory.length === 0 ? (
                            <div className="text-center py-8 text-gray-500">
                                <p className="text-lg">📭</p>
                                <p className="text-sm mt-1">Belum ada riwayat kemenangan yang tercatat.</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {winHistory.map((item, index) => (
                                    <div key={index} className="flex gap-3 p-3 bg-[#F6F4FC] rounded-xl border border-purple-100 items-start">
                                        <div className="bg-yellow-100 p-2 rounded-lg flex-shrink-0 text-lg">🏆</div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm font-semibold text-gray-800 break-words">{item.detail}</p>
                                            <p className="text-xs text-purple-600 font-medium mt-1">🕐 {item.time}</p>
                                        </div>
                                    </div>
                                ))}
                                <button 
                                    onClick={clearWinHistory} 
                                    className="w-full bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2 px-4 rounded-xl mt-4 transition-colors text-sm"
                                >
                                    🗑️ Bersihkan Riwayat
                                </button>
                            </div>
                        )}
                    </Modal>

                    <DebugModal isVisible={debugModalVisible} onClose={() => setDebugModalVisible(false)} info={debugInfo} />
                    <EditScoresModal isVisible={editModalVisible} onClose={() => setEditModalVisible(false)} data={data} players={players} onSave={handleSaveScores} />
                    <EditPlayersModal isVisible={editPlayersModalVisible} onClose={() => setEditPlayersModalVisible(false)} players={players} onSave={handleSavePlayers} />
                    <GoogleSheetsModal isVisible={sheetModalVisible} onClose={() => setSheetModalVisible(false)} currentUrl={sheetUrl} onSaveUrl={handleSaveSheetUrl} onSync={handleSyncToSheets} setNotification={setNotification} />
                    <ConfirmationModal isOpen={confirmModal.isOpen} title={confirmModal.title} message={confirmModal.message} onConfirm={confirmModal.onConfirm} onClose={() => setConfirmModal({ ...confirmModal, isOpen: false })} />

                    {/* Menu Sidebar */}
                    <SidebarMenu 
                        isOpen={isMenuOpen} 
                        onClose={() => setIsMenuOpen(false)}
                        isVoiceEnabled={isVoiceEnabled}
                        onToggleVoice={() => setIsVoiceEnabled(!isVoiceEnabled)}
                        voiceAlertsEnabled={voiceAlertsEnabled}
                        onToggleVoiceAlerts={() => setVoiceAlertsEnabled(!voiceAlertsEnabled)}
                        onShowHistory={() => setHistoryModalVisible(true)}
                        onShowDebug={handleShowDebug}
                        onEditScores={() => setEditModalVisible(true)}
                        onEditPlayers={() => setEditPlayersModalVisible(true)}
                        onEditStakes={() => setEditStakesModalVisible(true)}
                        onSaveToSheet={() => setSheetModalVisible(true)}
                    />

                    {/* Iframe Spotify */}
                    <SpotifyPlayer 
                        embedUrl={SPOTIFY_EMBED_URL} 
                        spotifyUri={SPOTIFY_URI} 
                        onControllerReady={(controller) => { spotifyControllerRef.current = controller; }}
                        isPlaying={isSpotifyPlaying}
                        setIsPlaying={setIsSpotifyPlaying}
                        isVisible={showSpotify}
                        onClose={() => setShowSpotify(false)}
                    />

                    <div className="p-4 pb-12">
                        <div className="flex justify-between items-center mb-2">
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={toggleListening} 
                                    className={`w-12 h-12 rounded-full flex items-center justify-center text-xl font-bold shadow-lg transition-colors ${isListening ? 'mic-listening' : 'bg-white text-[#4B0082] hover:bg-[#5D3FD3] hover:text-white'}`} 
                                    title="Perintah Suara (Voice Command)"
                                >
                                    🎤
                                </button>

                                <div className="flex bg-white rounded-full shadow-lg border border-gray-100 h-12">
                                    <button
                                        onClick={() => { if (spotifyControllerRef.current) { spotifyControllerRef.current.togglePlay(); setIsSpotifyPlaying(prev => !prev); } }}
                                        disabled={!spotifyControllerRef.current}
                                        className={`px-4 rounded-l-full flex items-center justify-center text-xl transition-colors ${isSpotifyPlaying ? 'bg-[#1DB954] text-white hover:bg-[#19a34a]' : 'text-[#4B0082] hover:bg-gray-50'}`}
                                        title="Play/Pause Spotify"
                                    >
                                        {isSpotifyPlaying ? '⏸️' : '▶️'}
                                    </button>
                                    <div className="w-px bg-gray-200"></div>
                                    <button
                                        onClick={() => setShowSpotify(true)}
                                        className="px-4 rounded-r-full flex items-center justify-center text-xl text-[#4B0082] hover:bg-gray-50 transition-colors"
                                        title="Buka Album/Playlist Spotify"
                                    >
                                        💿
                                    </button>
                                </div>
                            </div>

                            <div className="flex justify-end gap-2">
                                <button onClick={() => setIsMenuOpen(true)} className="w-12 h-12 rounded-full bg-white flex items-center justify-center text-[#4B0082] text-2xl font-bold shadow-lg border border-gray-100 hover:bg-[#5D3FD3] hover:text-white transition-colors" title="Buka Menu">
                                    ☰
                                </button>
                            </div>
                        </div>

                        {voiceTranscript && (
                            <div className="bg-gray-800 text-white p-3 rounded-lg mb-4 text-center text-sm shadow-inner break-words">
                                {voiceTranscript}
                            </div>
                        )}

                        {notification.message && (
                            <div className={`p-3 rounded-lg mb-4 text-center text-sm ${notificationColors[notification.type]}`}>
                                <p>{notification.message}</p>
                            </div>
                        )}
                        
                        <div className="flex items-center justify-center mb-4 relative">
                            <h1 className="text-3xl font-bold text-gray-800">📊 Tabel Skor</h1>
                            <button onClick={speakCurrentScores} className="w-12 h-12 rounded-full bg-white border border-[#5D3FD3] text-[#5D3FD3] text-xl flex items-center justify-center shadow-md hover:bg-purple-50 transition-colors absolute right-0" title="Baca Skor Sementara">🔊</button>
                        </div>
                        
                        <ScoreTable data={data} players={players} />

                        <WinSection 
                            players={players} 
                            onUpdateScore={handleUpdateScore} 
                            onUpdateTeamScore={handleUpdateTeamScore}
                            setNotification={setNotification}
                        />
                        <JokerTransferSection players={players} onJokerTransfer={handleJokerTransfer} />
                        
                        <ActionsSection 
                            onUndo={handleUndo} 
                            onRedo={handleRedo} 
                            onResetScores={handleResetScores} 
                            onResetStakes={handleResetStakes}
                        />
                    </div>

                    <EditStakesModal isVisible={editStakesModalVisible} onClose={() => setEditStakesModalVisible(false)} data={data} players={players} onSave={handleSaveStakes} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
