<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Keeper</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; overscroll-behavior: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-[#E9E4F5]">
    <div id="root"></div>

    <script type="text/babel">
        const PREFILLED_SHEET_URL = "https://script.google.com/macros/s/AKfycbxE8yRWM5hCfvbQfKSdEf7rpKo-yd8vHZrV_U_BFLV44emVWTyu3joi78bbnODjusM/exec"; 
        const { useState, useEffect, useCallback } = React;
        const DEFAULT_PLAYERS = ['Dm', 'Bd', 'Dd', 'Nr'];
        const DATA_KEY = '@scoreKeeperData_web';
        const BACKUP_KEY = '@scoreKeeperBackup_web';
        const REDO_KEY = '@scoreKeeperRedo_web';
        const HISTORY_KEY = '@scoreKeeperHistory_web';
        const PLAYER_KEY = '@scoreKeeperPlayers_web';
        const SHEETS_KEY = '@scoreKeeperSheets_web'; 

        const getInitialData = (players = DEFAULT_PLAYERS) => {
            const data = {};
            players.forEach(player => { data[player] = { patokan_normal: 0, patokan_joker: 0, skor: 0 }; });
            return data;
        };

        const App = () => {
            const [players, setPlayers] = useState(DEFAULT_PLAYERS);
            const [data, setData] = useState(null);
            const [notification, setNotificationRaw] = useState({ message: '', type: 'info' });
            const [isVoiceEnabled, setIsVoiceEnabled] = useState(true);
            const [sheetUrl, setSheetUrl] = useState('');

            // Voice synthesis helper
            const speak = useCallback((text) => {
                if (isVoiceEnabled && 'speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'id-ID';
                    window.speechSynthesis.speak(utterance);
                }
            }, [isVoiceEnabled]);

            const setNotification = useCallback((notif) => {
                setNotificationRaw(notif);
                setTimeout(() => setNotificationRaw({ message: '', type: 'info' }), 2000);
            }, []);

            const saveData = useCallback((newData) => {
                localStorage.setItem(BACKUP_KEY, JSON.stringify(data));
                localStorage.setItem(DATA_KEY, JSON.stringify(newData));
                setData(newData);
            }, [data]);

            const handleUpdateScore = (winner, isJoker, isWin2, jokerHolders = [], buyers = []) => {
                const newData = JSON.parse(JSON.stringify(data));
                // ... (logika perhitungan tetap sama)
                const losers = players.filter(p => p !== winner);
                let totalLoss = 0;
                losers.forEach(l => {
                    let loss = newData[l][isJoker ? 'patokan_joker' : 'patokan_normal'] + (jokerHolders.includes(l) ? (newData[l].patokan_joker - newData[l].patokan_normal) : 0);
                    if (isWin2) loss *= 2;
                    newData[l].skor -= loss;
                    totalLoss += loss;
                });
                newData[winner].skor += totalLoss;
                saveData(newData);
                
                // PENGUCAPAN SKOR
                speak(`${winner} menang. Skor akhir ${winner} adalah ${newData[winner].skor.toFixed(0)}`);
                setNotification({ message: `Skor ${winner} jadi ${newData[winner].skor}`, type: 'success' });
            };

            // ... (Fungsi lainnya)

            return (
                <div className="p-4 pb-24 max-w-2xl mx-auto">
                    {/* UI components tetap sama */}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
