<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Keeper</title>
    <!-- React & Babel Standalone CDNs (Stable Production Releases with Crossorigin) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior: none;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Animasi Mic Berkedip */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-listening {
            animation: pulse-red 1.5s infinite;
            background-color: #EF4444 !important;
            color: white !important;
        }
    </style>
</head>
<body class="bg-[#E9E4F5]">
    <div id="root"></div>

    <!-- Added data-presets and data-type="module" to prevent ES module appendChild errors -->
    <script type="text/babel" data-presets="env,react" data-type="module">
        // --- KONFIGURASI URL SCRIPT ---
        const PREFILLED_SHEET_URL = "https://script.google.com/macros/s/AKfycbxE8yRWM5hCfvbQfKSdEf7rpKo-yd8vHZrV_U_BFLV44emVWTyu3joi78bbnODjusM/exec"; 

        // --- KONFIGURASI SPOTIFY API ---
        const SPOTIFY_CLIENT_ID = "0ecec814727b4c4da8ac274dd9e8ca74"; 
        const SPOTIFY_CLIENT_SECRET = "d977b68913344e36abd42b9467b694ac";

        // Data URI untuk suara kosong (silence) berdurasi pendek. 
        const SILENT_AUDIO_URI = "data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIAD+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+AAAAAExhdmM1OC41NAAAAAAAAAAAAAAAACQAAAAAAAAAAAEgSbL2AAAAAAAAAAAA//MUXxAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//MUXxAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//MUXxAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//MUXxAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq";
        const SPOTIFY_EMBED_URL = 'https://open.spotify.com/embed/playlist/6dio66Z2ZaPAj4ZtoJFsoz';
        const SPOTIFY_URI = 'spotify:playlist:6dio66Z2ZaPAj4ZtoJFsoz';

        const { useState, useEffect, useCallback, useRef } = React;

        const DEFAULT_PLAYERS = ['Jambul', 'Dado', 'Demplon', 'Kinoy'];
        const DATA_KEY = '@scoreKeeperData_web';
        const BACKUP_KEY = '@scoreKeeperBackup_web';
        const REDO_KEY = '@scoreKeeperRedo_web';
        const HISTORY_KEY = '@scoreKeeperHistory_web';
        const PLAYER_KEY = '@scoreKeeperPlayers_web';
        const SHEETS_KEY = '@scoreKeeperSheets_web'; 

        // Fungsi pembungkus localStorage yang aman terhadap SecurityError di sandboxed iframe
        const checkLocalStorage = () => {
            try {
                return !!window.localStorage;
            } catch (e) {
                return false;
            }
        };

        const safeLocalStorage = {
            _data: {},
            getItem(key) {
                if (checkLocalStorage()) {
                    try {
                        return window.localStorage.getItem(key);
                    } catch (e) {}
                }
                return this._data[key] || null;
            },
            setItem(key, value) {
                if (checkLocalStorage()) {
                    try {
                        window.localStorage.setItem(key, value);
                        return;
                    } catch (e) {}
                }
                this._data[key] = String(value);
            },
            removeItem(key) {
                if (checkLocalStorage()) {
                    try {
                        window.localStorage.removeItem(key);
                        return;
                    } catch (e) {}
                }
                delete this._data[key];
            }
        };

        const getInitialData = (players = DEFAULT_PLAYERS) => {
            const data = {};
            players.forEach(player => {
                data[player] = { patokan_normal: 0, patokan_joker: 0, skor: 0 };
            });
            return data;
        };

        const CustomSwitch = ({ value, onValueChange, disabled }) => (
            <button
                type="button"
                onClick={() => !disabled && onValueChange(!value)}
                className={`relative inline-flex items-center h-6 rounded-full w-11 transition-colors ${
                    value ? 'bg-[#5D3FD3]' : 'bg-gray-300'
                } ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`}
                disabled={disabled}
            >
                <span className={`inline-block w-4 h-4 transform bg-white rounded-full transition-transform ${
                    value ? 'translate-x-6' : 'translate-x-1'
                }`} />
            </button>
        );

        const Modal = ({ isVisible, onClose, title, children }) => {
            if (!isVisible) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl p-6 shadow-xl max-h-[80vh] w-full max-w-md flex flex-col" onClick={e => e.stopPropagation()}>
                        <h2 className="text-2xl font-bold mb-4 text-center">{title}</h2>
                        <div className="overflow-y-auto flex-grow">{children}</div>
                        <button onClick={onClose} className="w-full bg-[#5D3FD3] text-white font-bold py-3 px-4 rounded-lg mt-4 hover:bg-[#4B0082] transition-colors">Tutup</button>
                    </div>
                </div>
            );
        };

        const ConfirmationModal = ({ isOpen, title, message, onConfirm, onClose }) => {
            if (!isOpen) return null;
            const handleConfirm = () => {
                onClose(); 
                onConfirm(); 
            };
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
                    <div className="bg-white rounded-2xl p-6 shadow-xl w-full max-w-sm" onClick={e => e.stopPropagation()}>
                        <h2 className="text-xl font-bold mb-2 text-center">{title}</h2>
                        <p className="text-gray-600 mb-6 text-center">{message}</p>
                        <div className="flex justify-center gap-4">
                            <button onClick={onClose} className="flex-1 bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300">Batal</button>
                            <button onClick={handleConfirm} className="flex-1 bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700">YA</button>
                        </div>
                    </div>
                </div>
            );
        };

        const GoogleSheetsModal = ({ isVisible, onClose, currentUrl, onSaveUrl, onSync, setNotification }) => {
            const [url, setUrl] = useState(currentUrl || '');
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => { setUrl(currentUrl || ''); }, [currentUrl, isVisible]);

            const handleSync = async () => {
                if (!url) { 
                    setNotification({message: "URL belum disetting!", type: "error"});
                    return; 
                }
                setIsSyncing(true);
                await onSync(url);
                setIsSyncing(false);
            };

            if (!isVisible) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl p-6 shadow-xl max-h-[90vh] w-full max-w-md flex flex-col" onClick={e => e.stopPropagation()}>
                        <h2 className="text-2xl font-bold mb-4 text-center text-[#4B0082]">☁️ Simpan ke Google Sheet</h2>
                        
                        <div className="mb-4 text-left">
                            <label className="block text-sm font-semibold text-gray-700 mb-1">🔗 Google Sheets Script URL</label>
                            <input
                                type="text"
                                value={url}
                                onChange={e => {
                                    const newUrl = e.target.value;
                                    setUrl(newUrl);
                                    onSaveUrl(newUrl);
                                }}
                                placeholder="https://script.google.com/macros/s/..."
                                className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-[#5D3FD3] transition-colors"
                            />
                        </div>

                        <div className="mb-6 text-center">
                            <p className="text-sm font-semibold text-gray-700">Status Koneksi:</p>
                            <p className={`text-sm ${url ? 'text-green-600 font-bold' : 'text-red-500 font-bold'}`}>
                                {url ? "✅ Terhubung ke Server" : "⚠️ URL Belum Dikonfigurasi"}
                            </p>
                        </div>

                        <button onClick={handleSync} disabled={isSyncing || !url} className={`w-full text-white font-bold py-3 px-4 rounded-lg mb-2 transition-colors shadow-md ${isSyncing || !url ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'}`}>
                            {isSyncing ? '⏳ Mengirim Data...' : '📤 Kirim Skor ke Sheet'}
                        </button>
                        <button onClick={onClose} className="w-full bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg mt-2 hover:bg-gray-400">Tutup</button>
                    </div>
                </div>
            );
        };

        const ScoreTable = ({ data, players }) => {
            if (!data) return <div className="text-center mt-5 text-lg text-gray-600">Loading data...</div>;
            return (
                <div className="bg-white rounded-xl p-4 mb-5 shadow-md">
                    <div className="flex pb-2 border-b-2 border-gray-300">
                        <p className="flex-[3] text-base font-bold text-black">Pemain</p>
                        <p className="flex-1 text-base font-bold text-black text-center">N</p>
                        <p className="flex-1 text-base font-bold text-black text-center">J</p>
                        <p className="flex-[2] text-base font-bold text-black text-right">Skor</p>
                    </div>
                    {players.map(player => {
                        const info = data[player];
                        const score = info?.skor ?? 0;
                        const scoreColor = score > 0 ? 'text-green-600' : score < 0 ? 'text-red-600' : 'text-gray-800';
                        return(
                            <div key={player} className="flex items-center py-2.5 border-b border-gray-100 last:border-b-0">
                                <p className="flex-[3] text-base text-gray-800">{player}</p>
                                <p className="flex-1 text-base text-gray-800 text-center">{info?.patokan_normal ?? 0}</p>
                                <p className="flex-1 text-base text-gray-800 text-center">{info?.patokan_joker ?? 0}</p>
                                <p className={`flex-[2] text-base text-right font-bold ${scoreColor}`}>
                                    {score.toFixed(2).replace('.', ',')}
                                </p>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const SpotifyPlayer = ({ embedUrl, spotifyUri, onControllerReady, isPlaying, setIsPlaying, isVisible, onClose }) => {
            const iframeRef = useRef(null);
            const controllerRef = useRef(null);
            const [loaded, setLoaded] = useState(false);
            
            // State untuk fitur pencarian
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [accessToken, setAccessToken] = useState(null);

            // Fungsi untuk mendapatkan Token dari Client Credentials Flow
            const fetchAccessToken = async () => {
                if (!SPOTIFY_CLIENT_ID || !SPOTIFY_CLIENT_SECRET || SPOTIFY_CLIENT_ID.includes("MASUKKAN")) {
                    console.warn("Client ID atau Secret Spotify belum diatur di kode!");
                    return null;
                }
                try {
                    const response = await fetch('https://accounts.spotify.com/api/token', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                            'Authorization': 'Basic ' + btoa(SPOTIFY_CLIENT_ID + ':' + SPOTIFY_CLIENT_SECRET)
                        },
                        body: 'grant_type=client_credentials'
                    });
                    const data = await response.json();
                    setAccessToken(data.access_token);
                    return data.access_token;
                } catch (error) {
                    console.error("Gagal mendapatkan token Spotify:", error);
                    return null;
                }
            };

            // Fungsi untuk mencari lagu
            const handleSearch = async () => {
                if (!searchQuery.trim()) return;
                setIsSearching(true);
                
                let currentToken = accessToken;
                if (!currentToken) {
                    currentToken = await fetchAccessToken();
                }

                if (currentToken) {
                    try {
                        const response = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(searchQuery)}&type=track&limit=5`, {
                            headers: { 'Authorization': `Bearer ${currentToken}` }
                        });
                        if (response.status === 401) {
                            // Token expired, fetch ulang
                            currentToken = await fetchAccessToken();
                            return handleSearch(); // Coba lagi
                        }
                        const data = await response.json();
                        setSearchResults(data.tracks?.items || []);
                    } catch (error) {
                        console.error("Gagal mencari lagu:", error);
                    }
                }
                setIsSearching(false);
            };

            // Fungsi untuk memutar lagu yang dipilih
            const playTrack = (uri) => {
                if (controllerRef.current) {
                    controllerRef.current.loadUri(uri);
                    controllerRef.current.play();
                    setSearchResults([]); // Kosongkan hasil pencarian setelah dipilih
                    setSearchQuery('');
                }
            };

            // Fungsi untuk memutar playlist awal / kembali ke Home
            const playHome = () => {
                if (controllerRef.current) {
                    controllerRef.current.loadUri(spotifyUri);
                    controllerRef.current.play();
                    setSearchResults([]); 
                    setSearchQuery('');
                }
            };

            useEffect(() => {
                const onReady = (SpotifyIframe) => {
                    const iframe = iframeRef.current;
                    if (!iframe || !SpotifyIframe) return;

                    SpotifyIframe.createController(iframe, {
                        uri: spotifyUri,
                        width: '100%',
                        height: '500',
                        theme: 'black',
                        allow: 'encrypted-media'
                    }, (EmbedController) => {
                        controllerRef.current = EmbedController;
                        if (onControllerReady) {
                            onControllerReady(EmbedController);
                        }
                        setLoaded(true);

                        EmbedController.addListener('playback_update', e => {
                            if (e && e.data) {
                                setIsPlaying(!e.data.isPaused);
                            }
                        });
                    });
                };

                window.onSpotifyIframeApiReady = onReady;

                const existingScript = document.querySelector('script[src="https://open.spotify.com/embed/iframe-api/v1"]');
                if (!existingScript) {
                    const script = document.createElement('script');
                    script.src = 'https://open.spotify.com/embed/iframe-api/v1'; // Menggunakan URL Iframe API yang lebih baru dan stabil
                    script.async = true;
                    document.body.appendChild(script);
                } else if (window.SpotifyIframe) {
                    onReady(window.SpotifyIframe);
                }

                return () => {
                    if (window.onSpotifyIframeApiReady === onReady) {
                        window.onSpotifyIframeApiReady = null;
                    }
                };
            }, [spotifyUri]);

            return (
                <>
                    {isVisible && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity" onClick={onClose}></div>
                    )}
                    
                    <div className={`fixed z-50 left-0 right-0 mx-auto w-full max-w-md px-4 transition-all duration-300 ${isVisible ? 'top-10 opacity-100 scale-100' : '-top-[999px] opacity-0 scale-95 pointer-events-none'}`}>
                        <div className="bg-white rounded-2xl p-4 shadow-2xl border border-gray-100 flex flex-col max-h-[85vh]">
                            <div className="flex justify-between items-center mb-3">
                                <h2 className="text-xl font-bold text-[#1DB954] flex items-center gap-2">🎵 <span>Spotify Player</span></h2>
                                <div className="flex gap-2">
                                    <button onClick={playHome} className="bg-gray-100 hover:bg-[#1DB954] hover:text-white text-gray-800 rounded-full w-8 h-8 flex items-center justify-center font-bold transition-colors shadow-sm" title="Kembali ke Album Awal">🏠</button>
                                    <button onClick={onClose} className="bg-gray-100 hover:bg-red-500 hover:text-white text-gray-800 rounded-full w-8 h-8 flex items-center justify-center font-bold transition-colors shadow-sm" title="Tutup">✕</button>
                                </div>
                            </div>

                            {/* Form Pencarian */}
                            <div className="mb-3">
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                                        placeholder="Cari lagu..." 
                                        className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#1DB954]"
                                    />
                                    <button 
                                        onClick={handleSearch}
                                        disabled={isSearching}
                                        className="bg-[#1DB954] hover:bg-[#19a34a] text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors disabled:opacity-50"
                                    >
                                        {isSearching ? '⏳' : 'Cari'}
                                    </button>
                                </div>

                                {/* Hasil Pencarian */}
                                {searchResults.length > 0 && (
                                    <div className="mt-2 bg-gray-50 border border-gray-200 rounded-lg max-h-40 overflow-y-auto">
                                        {searchResults.map((track) => (
                                            <div 
                                                key={track.id} 
                                                onClick={() => playTrack(track.uri)}
                                                className="flex items-center gap-3 p-2 hover:bg-gray-200 cursor-pointer border-b border-gray-100 last:border-0"
                                            >
                                                <img src={track.album.images[2]?.url} alt={track.name} className="w-10 h-10 rounded" />
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-sm font-bold text-gray-800 truncate">{track.name}</p>
                                                    <p className="text-xs text-gray-500 truncate">{track.artists.map(a => a.name).join(', ')}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Spotify Iframe */}
                            <div className="flex-1 overflow-hidden rounded-xl bg-gray-900 border border-gray-200">
                                <iframe
                                    ref={iframeRef}
                                    title="Spotify Player"
                                    src={embedUrl}
                                    width="100%"
                                    height="500"
                                    allow="encrypted-media"
                                    frameBorder="0"
                                    className="w-full h-full"
                                />
                            </div>
                            {!loaded && <p className="mt-3 text-sm text-gray-500 text-center animate-pulse">Memuat Spotify...</p>}
                        </div>
                    </div>
                </>
            );
        };

        const WinSection = ({ players, onUpdateScore, onUpdateTeamScore, setNotification }) => {
            const [winners, setWinners] = useState([]);
            const [isJoker, setIsJoker] = useState(false);
            const [isWin2, setIsWin2] = useState(false);
            const [jokerHolders, setJokerHolders] = useState([]);
            const [buyers, setBuyers] = useState({});

            useEffect(() => {
                setBuyers(players.reduce((acc, p) => ({...acc, [p]: ''}), {}));
                setWinners([]); setIsJoker(false); setIsWin2(false); setJokerHolders([]);
            }, [players]);

            const togglePlayer = (p, list, setList) => {
                setList(prev => prev.includes(p) ? prev.filter(i => i !== p) : [...prev, p]);
            };
            const resetForm = () => {
                setWinners([]); setIsJoker(false); setIsWin2(false); setJokerHolders([]);
                setBuyers(players.reduce((acc, p) => ({...acc, [p]: ''}), {}));
            };
            const handleSubmit = () => {
                if (winners.length === 0 || winners.length > 2) {
                    setNotification({message: 'Pilih 1 atau 2 pemenang.', type: 'error'}); return;
                }
                const parsedBuyers = Object.entries(buyers)
                    .filter(([,amount]) => amount && !isNaN(parseInt(amount)))
                    .map(([name, amount]) => ({name, amount: parseInt(amount)}));
                
                if (winners.length === 1) {
                    onUpdateScore(winners[0], isJoker, isWin2, jokerHolders, parsedBuyers);
                } else {
                    onUpdateTeamScore(winners, jokerHolders, parsedBuyers);
                }
                resetForm();
            };
            const possibleLosers = players.filter(p => !winners.includes(p));

            return (
                <div className="bg-white rounded-xl p-4 mb-5 shadow-md">
                    <h2 className="text-xl font-bold mb-4 text-[#4B0082]">🏆 Catat Kemenangan</h2>
                    <label className="text-base font-semibold mb-2 block text-gray-700">1. Pilih Pemenang (1 atau 2)</label>
                    <div className="flex flex-wrap mb-3 -m-1">
                        {players.map(p => (
                            <button key={p} onClick={() => togglePlayer(p, winners, setWinners)} className={`py-2 px-4 rounded-full m-1 border transition-colors ${winners.includes(p) ? 'bg-[#5D3FD3] border-[#4B0082] text-white' : 'bg-gray-100 border-gray-300 text-gray-800'}`}>
                                {p}
                            </button>
                        ))}
                    </div>
                    <div className="flex justify-between items-center py-2">
                        <label className="text-base font-semibold text-gray-700">Menang Joker?</label>
                        <CustomSwitch value={isJoker} onValueChange={setIsJoker} disabled={winners.length === 2}/>
                    </div>
                    <div className="flex justify-between items-center py-2">
                        <label className="text-base font-semibold text-gray-700">Menang x2?</label>
                        <CustomSwitch value={isWin2} onValueChange={setIsWin2} disabled={winners.length === 2}/>
                    </div>
                    <label className="text-base font-semibold mt-4 mb-2 block text-gray-700">2. Opsi Tambahan (Opsional)</label>
                    <p className="text-sm font-medium mb-1 text-gray-600">Penalti Joker (yang kalah)</p>
                    <div className="flex flex-wrap mb-3 -m-1">
                        {possibleLosers.map(p => (
                            <button key={p} onClick={() => togglePlayer(p, jokerHolders, setJokerHolders)} className={`py-2 px-4 rounded-full m-1 border transition-colors ${jokerHolders.includes(p) ? 'bg-[#5D3FD3] border-[#4B0082] text-white' : 'bg-gray-100 border-gray-300 text-gray-800'}`}>
                                {p} -j
                            </button>
                        ))}
                    </div>
                    <p className="text-sm font-medium mb-2 text-gray-600">Beli Poin</p>
                    <div className="grid grid-cols-2 gap-x-4 gap-y-2">
                        {players.map(p => (
                            <div key={p} className="flex items-center">
                                <label className="flex-1 text-base">{p} beli:</label>
                                <input type="number" placeholder="0" value={buyers[p] || ''} onChange={e => setBuyers(prev => ({...prev, [p]: e.target.value}))} className="flex-1 border border-gray-300 rounded-lg p-2 text-center w-full"/>
                            </div>
                        ))}
                    </div>
                    <button onClick={handleSubmit} className="w-full bg-[#5D3FD3] text-white font-bold py-3 px-4 rounded-lg mt-4 hover:bg-[#4B0082] transition-colors">Submit Kemenangan</button>
                </div>
            );
        };

        const JokerTransferSection = ({ players, onJokerTransfer }) => {
            const [gainer, setGainer] = useState(null);
            const [loser, setLoser] = useState(null);

        const DebugModal = ({ isVisible, onClose, info }) => {

        const getStack = (key) => {
            try {
                const item = safeLocalStorage.getItem(key);
                if (!item) return [];
                const parsed = JSON.parse(item);
                return Array.isArray(parsed) ? parsed : [];
            } catch (e) {
                return [];
            }
        };

        const App = () => {
            const [players, setPlayers] = useState(DEFAULT_PLAYERS);
            const [data, setData] = useState(null);
            const [notification, setNotificationRaw] = useState({ message: 'Welcome! Gunakan fitur Voice untuk mencatat skor otomatis.', type: 'info' });
            
            const [helpModalVisible, setHelpModalVisible] = useState(false);
            const [editModalVisible, setEditModalVisible] = useState(false);
            const [editPlayersModalVisible, setEditPlayersModalVisible] = useState(false);
            const [editStakesModalVisible, setEditStakesModalVisible] = useState(false);
            const [sheetModalVisible, setSheetModalVisible] = useState(false); 
            const [debugModalVisible, setDebugModalVisible] = useState(false);
            const [debugInfo, setDebugInfo] = useState(null);
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: () => {} });
            
            // Audio ref for forced audio focus on mobile
            const audioRef = useRef(null);
            const audioCtxRef = useRef(null);

            // Voice State
            const [isVoiceEnabled, setIsVoiceEnabled] = useState(true);
            const [isListening, setIsListening] = useState(false);
            const [voiceTranscript, setVoiceTranscript] = useState('');
            const [voiceAlertsEnabled, setVoiceAlertsEnabled] = useState(true);

            const [sheetUrl, setSheetUrl] = useState('');
            const [consecutiveDemplonWins, setConsecutiveDemplonWins] = useState(0);
            const [consecutiveDadoWins, setConsecutiveDadoWins] = useState(0);
            const [consecutiveJambulWins, setConsecutiveJambulWins] = useState(0);
            const [consecutiveKinoyWins, setConsecutiveKinoyWins] = useState(0);

            // Spotify Integration States
            const [isSpotifyPlaying, setIsSpotifyPlaying] = useState(false);
            const [showSpotify, setShowSpotify] = useState(false); // State untuk floating modal spotify
            const spotifyControllerRef = useRef(null);
            const wasSpotifyPlayingRef = useRef(false);
            const ttsActiveRef = useRef(false);
            const currentUtteranceIdRef = useRef(null);

            const setNotification = useCallback((notif) => {
                setNotificationRaw(notif);
                if (notif && notif.message) {
                    window.scrollTo({top: 0, behavior: 'smooth'}); 
                    setTimeout(() => {
                        setNotificationRaw({ message: '', type: notif.type || 'info' });
                    }, 3000);
                }
            }, []);

            // --- Fungsi Teks ke Suara (Text to Speech) dengan penanganan Spotify Pause/Resume ---
            const speak = useCallback((text) => {
                if (isVoiceEnabled && 'speechSynthesis' in window) {
                    // Trik 1: Inisialisasi Web Audio API (Lebih agresif mengambil focus di Android)
                    if (!audioCtxRef.current) {
                        try { audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
                    }
                    let osc = null;
                    if (audioCtxRef.current) {
                        const ctx = audioCtxRef.current;
                        if (ctx.state === 'suspended') ctx.resume();
                        try {
                            osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            gain.gain.value = 0; // Volume 0 (Silent)
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start();
                        } catch(e) {}
                    }

                    // Trik 2: Mainkan HTML5 Audio kosong untuk mengelabui OS
                    if (audioRef.current) {
                        audioRef.current.play().catch(e => console.log("Gagal memutar audio kosong:", e));
                    }

                    // Trik 3: Lapor ke Media Session OS Android
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.playbackState = 'playing';
                    }

                    // Hentikan pidato yang sedang berjalan sebelumnya
                    window.speechSynthesis.cancel();
                    const utteranceId = Math.random();
                    currentUtteranceIdRef.current = utteranceId;

                    // Mengatur otomatis jeda/pause Spotify jika sedang memutar lagu
                    if (!ttsActiveRef.current) {
                        if (isSpotifyPlaying && spotifyControllerRef.current) {
                            wasSpotifyPlayingRef.current = true;
                            spotifyControllerRef.current.pause();
                        } else {
                            wasSpotifyPlayingRef.current = false;
                        }
                    }
                    ttsActiveRef.current = true;

                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'id-ID'; 
                    
                    // Ketika selesai ngomong, matikan semua trik audio & resume Spotify kembali
                    const stopFocus = () => {
                        if (currentUtteranceIdRef.current !== utteranceId) {
                            // Abaikan penyelesaian dari TTS sebelumnya yang sudah ter-interupsi
                            return;
                        }

                        if (osc) {
                            try { osc.stop(); } catch(e) {}
                        }
                        if (audioRef.current) {
                            audioRef.current.pause();
                            audioRef.current.currentTime = 0;
                        }
                        if ('mediaSession' in navigator) {
                            navigator.mediaSession.playbackState = 'none';
                        }

                        ttsActiveRef.current = false;

                        // Lanjutkan kembali pemutaran Spotify
                        if (wasSpotifyPlayingRef.current && spotifyControllerRef.current) {
                            setTimeout(() => {
                                if (currentUtteranceIdRef.current === utteranceId && spotifyControllerRef.current) {
                                    if (typeof spotifyControllerRef.current.resume === 'function') {
                                        spotifyControllerRef.current.resume();
                                    } else {
                                        spotifyControllerRef.current.play();
                                    }
                                    wasSpotifyPlayingRef.current = false;
                                }
                            }, 800); // Penundaan halus 800ms
                        }
                    };

                    utterance.onend = stopFocus;
                    utterance.onerror = stopFocus;

                    window.speechSynthesis.speak(utterance);
                }
            }, [isVoiceEnabled, isSpotifyPlaying]);

            useEffect(() => {
                try {
                    const jsonPlayers = safeLocalStorage.getItem(PLAYER_KEY);
                    const loadedPlayers = jsonPlayers ? JSON.parse(jsonPlayers) : DEFAULT_PLAYERS;
                    setPlayers(loadedPlayers);
                    const jsonData = safeLocalStorage.getItem(DATA_KEY);
                    setData(jsonData ? JSON.parse(jsonData) : getInitialData(loadedPlayers));
                    const savedSheetUrl = safeLocalStorage.getItem(SHEETS_KEY);
                    setSheetUrl(savedSheetUrl || PREFILLED_SHEET_URL || '');
                } catch (e) {
                    setPlayers(DEFAULT_PLAYERS);
                    setData(getInitialData(DEFAULT_PLAYERS));
                }
            }, []);

            const saveData = useCallback((newData, backupCurrent = true) => {
                try {
                    if (backupCurrent && data) {
                        let undoStack = getStack(BACKUP_KEY);
                        undoStack.push(data);
                        if (undoStack.length > 5) undoStack.shift();
                        safeLocalStorage.setItem(BACKUP_KEY, JSON.stringify(undoStack));
                        safeLocalStorage.removeItem(REDO_KEY);
                    }
                    safeLocalStorage.setItem(DATA_KEY, JSON.stringify(newData));
                    setData(newData);
                } catch (e) {
                    setNotification({ message: 'Error saving data!', type: 'error' });
                }
            }, [data, setNotification]);

            const handleSaveSheetUrl = (url) => { setSheetUrl(url); safeLocalStorage.setItem(SHEETS_KEY, url); };
            
            const handleSyncToSheets = async (targetUrl) => {
                if (!data) return;
                const scoresMap = {};
                players.forEach(p => scoresMap[p] = data[p]?.skor ?? 0);
                const payload = { players: players, scores: scoresMap };
                try {
                    await fetch(targetUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    setNotification({ message: '✅ Data terkirim ke Google Sheet!', type: 'success' });
                    setSheetModalVisible(false);
                } catch (error) {
                    setNotification({ message: '❌ Gagal mengirim. Cek URL atau koneksi.', type: 'error' });
                }
            };

            const logHistory = useCallback((text) => {
                const time = new Date().toLocaleString('id-ID', { hour12: false });
                const newEntry = `[${time}] ${text}`;
                const currentHistory = JSON.parse(safeLocalStorage.getItem(HISTORY_KEY) || '[]');
                const updatedHistory = [newEntry, ...currentHistory].slice(50);
                safeLocalStorage.setItem(HISTORY_KEY, JSON.stringify(updatedHistory));
            }, []);

            const handleUpdateScore = (winner, isJoker, isWin2, jokerHolders = [], buyers = []) => {
                if (!data) return;
                const newData = JSON.parse(JSON.stringify(data));
                const key = isJoker ? 'patokan_joker' : 'patokan_normal';
                
                for (const p of players) {
                    if (!newData[p] || newData[p][key] <= 0) {
                        setNotification({message: `⚠️ Gagal! ${p} belum set nilai ${isJoker ? 'Joker' : 'Normal'}.`, type: 'error'});
                        return;
                    }
                }

                const losers = players.filter(p => p !== winner);
                let totalLoss = 0;

                losers.forEach(loser => {
                    const normalStake = newData[loser]?.patokan_normal ?? 0;
                    const jokerStake = newData[loser]?.patokan_joker ?? 0;
                    let baseLoss = newData[loser]?.[key] ?? 0;
                    let jokerPenaltyCalc = jokerHolders.includes(loser) ? (jokerStake - normalStake) : 0;
                    const buyerInfo = buyers.find(b => b.name === loser);
                    let buyPenaltyCalc = buyerInfo ? buyerInfo.amount * normalStake : 0;
                    let loss = baseLoss + jokerPenaltyCalc + buyPenaltyCalc;
                    if (isWin2) loss *= 2;
                    if (newData[loser]) {
                        newData[loser].skor -= loss;
                    }
                    totalLoss += loss;
                });

                if (newData[winner]) {
                    newData[winner].skor += totalLoss;
                }

                const totalCheck = players.reduce((sum, p) => sum + (newData[p]?.skor ?? 0), 0);
                if (Math.abs(totalCheck) > 0.01) {
                    setNotification({ message: `❌ Perubahan dibatalkan! Total skor tidak seimbang.`, type: 'error' });
                    return;
                }

                saveData(newData);
                let logMsg = `${winner} menang ronde ${isJoker ? 'joker' : 'biasa'}${isWin2 ? ' (x2)' : ''} (+${totalLoss.toFixed(2)})`;
                if (jokerHolders.length > 0) logMsg += `, penalti joker: ${jokerHolders.join(', ')}`;
                if (buyers.length > 0) logMsg += `, beli: ${buyers.map(b => `${b.name} ${b.amount}x`).join(', ')}`;
                logHistory(logMsg);
                setNotification({ message: `🎉 ${logMsg}`, type: 'success' });

                // Update consecutive counters for Demplon, Dado, Jambul, and Kinoy
                let newDemplon = consecutiveDemplonWins;
                let newDado = consecutiveDadoWins;
                let newJambul = consecutiveJambulWins;
                let newKinoy = consecutiveKinoyWins;

                if (winner === 'Demplon') {
                    newDemplon = consecutiveDemplonWins + 1;
                    setConsecutiveDemplonWins(newDemplon);
                    if (consecutiveDadoWins !== 0) setConsecutiveDadoWins(0);
                    if (consecutiveJambulWins !== 0) setConsecutiveJambulWins(0);
                    if (consecutiveKinoyWins !== 0) setConsecutiveKinoyWins(0);
                } else if (winner === 'Dado') {
                    newDado = consecutiveDadoWins + 1;
                    setConsecutiveDadoWins(newDado);
                    if (consecutiveDemplonWins !== 0) setConsecutiveDemplonWins(0);
                    if (consecutiveJambulWins !== 0) setConsecutiveJambulWins(0);
                    if (consecutiveKinoyWins !== 0) setConsecutiveKinoyWins(0);
                } else if (winner === 'Jambul') {
                    newJambul = consecutiveJambulWins + 1;
                    setConsecutiveJambulWins(newJambul);
                    if (consecutiveDemplonWins !== 0) setConsecutiveDemplonWins(0);
                    if (consecutiveDadoWins !== 0) setConsecutiveDadoWins(0);
                    if (consecutiveKinoyWins !== 0) setConsecutiveKinoyWins(0);
                } else if (winner === 'Kinoy') {
                    newKinoy = consecutiveKinoyWins + 1;
                    setConsecutiveKinoyWins(newKinoy);
                    if (consecutiveDemplonWins !== 0) setConsecutiveDemplonWins(0);
                    if (consecutiveDadoWins !== 0) setConsecutiveDadoWins(0);
                    if (consecutiveJambulWins !== 0) setConsecutiveJambulWins(0);
                } else {
                    if (consecutiveDemplonWins !== 0) setConsecutiveDemplonWins(0);
                    if (consecutiveDadoWins !== 0) setConsecutiveDadoWins(0);
                    if (consecutiveJambulWins !== 0) setConsecutiveJambulWins(0);
                    if (consecutiveKinoyWins !== 0) setConsecutiveKinoyWins(0);
                }

                // Prefer specific messages for Jambul, Kinoy, Dado, then Demplon
                let prefix = '';
                if (winner === 'Jambul') {
                    if (newJambul >= 3) prefix = 'hat trick cuy';
                    else if (newJambul === 2) prefix = 'yes jambul menang lagi';
                    else if (newJambul === 1) prefix = 'wah jambul menang';
                } else if (winner === 'Kinoy') {
                    if (newKinoy >= 3) prefix = 'cukup sampai disini dulu ya kinoy';
                    else if (newKinoy === 2) prefix = 'hebat kinoy menang lagi';
                    else if (newKinoy === 1) prefix = 'wah kinoy menang nih';
                } else if (winner === 'Dado') {
                    if (newDado >= 4) prefix = 'dado lagi dado lagi bosen ah';
                    else if (newDado === 3) prefix = 'demplon tolong stop dado';
                    else if (newDado === 2) prefix = 'biji kadut menang lagi';
                    else if (newDado === 1) prefix = 'dado menang nih';
                } else if (winner === 'Demplon') {
                    if (newDemplon >= 4) prefix = 'Demplon kamu sudah bole stop dulu';
                    else if (newDemplon === 3) prefix = 'Gile loe dro menang melulu';
                    else if (newDemplon === 2) prefix = 'ehem demplon menang lagi';
                    else if (newDemplon === 1) prefix = 'demplon menang nih';
                }

                // Hanya beri notifikasi suara singkat (prefix + poin yang didapat) jika voice alerts aktif.
                const shortSpeech = `${winner} mendapatkan ${Math.round(totalLoss)} poin.`;
                if (prefix) {
                    if (voiceAlertsEnabled) {
                        speak(`${prefix}. ${shortSpeech}`);
                    }
                } else {
                    if (voiceAlertsEnabled) speak(shortSpeech);
                }
            };

            const handleUpdateTeamScore = (winners, jokerHolders = [], buyers = []) => {
                if (!data) return;
                let newData = JSON.parse(JSON.stringify(data));
                for (const p of players) {
                    if (!newData[p] || newData[p].patokan_normal <= 0) {
                        setNotification({ message: `⚠️ Gagal! ${p} belum set nilai Normal.`, type: 'error' });
                        return;
                    }
                }
                const losers = players.filter(p => !winners.includes(p));
                const winnerBuyers = buyers.filter(b => winners.includes(b.name));
                const loserBuyers = buyers.filter(b => losers.includes(b.name));
                if (winnerBuyers.length > 1) {
                    setNotification({ message: `❌ Hanya satu pemenang yang boleh buy.`, type: 'error' }); return;
                }
                const totalNormalStake = players.reduce((sum, p) => sum + (newData[p]?.patokan_normal ?? 0), 0);
                const baseChange = totalNormalStake / players.length;
                let totalJokerPenalty = 0;
                jokerHolders.forEach(jh => { 
                    totalJokerPenalty += (newData[jh]?.patokan_joker ?? 0) - (newData[jh]?.patokan_normal ?? 0); 
                });
                let totalLoserBuyPenalty = 0;
                loserBuyers.forEach(b => { 
                    totalLoserBuyPenalty += b.amount * (newData[b.name]?.patokan_normal ?? 0); 
                });
                
                losers.forEach(loser => {
                    let currentLoss = baseChange;
                    const jokerPenaltyCalc = jokerHolders.includes(loser) ? ((newData[loser]?.patokan_joker ?? 0) - (newData[loser]?.patokan_normal ?? 0)) : 0;
                    const buyerInfo = loserBuyers.find(b => b.name === loser);
                    const finalBuyPenalty = buyerInfo ? buyerInfo.amount * (newData[loser]?.patokan_normal ?? 0) : 0;
                    if (newData[loser]) {
                        newData[loser].skor -= currentLoss + jokerPenaltyCalc + finalBuyPenalty;
                    }
                });
                
                const totalGainFromLosers = totalJokerPenalty + totalLoserBuyPenalty;
                const baseGainPerWinner = baseChange + (totalGainFromLosers / winners.length);
                
                if (winnerBuyers.length === 1 && winners.length === 2) {
                    const winnerBuyer = winnerBuyers[0];
                    const otherWinner = winners.find(w => w !== winnerBuyer.name);
                    const transferAmount = ((newData[winnerBuyer.name]?.patokan_normal ?? 0) * winnerBuyer.amount) / winners.length;
                    if (newData[winnerBuyer.name]) newData[winnerBuyer.name].skor += baseGainPerWinner - transferAmount;
                    if (newData[otherWinner]) newData[otherWinner].skor += baseGainPerWinner + transferAmount;
                } else {
                    winners.forEach(winner => { 
                        if (newData[winner]) newData[winner].skor += baseGainPerWinner; 
                    });
                }
                
                const totalCheck = players.reduce((sum, p) => sum + (newData[p]?.skor ?? 0), 0);
                if (Math.abs(totalCheck) > 0.01) {
                    setNotification({ message: `❌ Perubahan dibatalkan! Total skor tidak seimbang.`, type: 'error' }); return;
                }

                saveData(newData);
                let logMsg = `Tim ${winners.join(' & ')} menang`;
                if (jokerHolders.length > 0) logMsg += `, penalti joker: ${jokerHolders.join(', ')}`;
                if (buyers.length > 0) logMsg += `, beli: ${buyers.map(b => `${b.name} ${b.amount}x`).join(', ')}`;
                logHistory(logMsg);
                setNotification({ message: `🤝 ${logMsg}`, type: 'success' });

                const shortTeamSpeech = `${winners.join(' dan ')} mendapatkan ${Math.round(baseGainPerWinner)} poin.`;
                if (voiceAlertsEnabled) speak(shortTeamSpeech);
            };

            // Tombol / fungsi untuk membacakan skor saat diminta (skor sementara)
            const speakCurrentScores = () => {
                if (!data) { setNotification({ message: 'Data belum tersedia untuk dibacakan.', type: 'error' }); return; }
                const scoreText = players.map(p => `${p} ${Math.round(data[p]?.skor ?? 0)}`).join(', ');
                speak(`Skor saat ini: ${scoreText}`);
            };

            const handleJokerTransfer = (gainer, loser) => {
                if (!data) return false;
                if (!gainer || !loser || gainer === loser) {
                    setNotification({message: "Pilih 2 pemain yang berbeda.", type: 'error'}); return false;
                }
                const newData = JSON.parse(JSON.stringify(data));
                if (!newData[loser] || !newData[gainer] || newData[loser].patokan_joker <= 0 || newData[loser].patokan_normal <= 0) {
                    setNotification({ message: `⚠️ Gagal! ${loser} belum set patokan.`, type: 'error'}); return false;
                }
                const transferAmount = newData[loser].patokan_joker - newData[loser].patokan_normal;
                newData[gainer].skor += transferAmount;
                newData[loser].skor -= transferAmount;
                saveData(newData);
                
                const logMsg = `Transfer joker dari ${loser} ke ${gainer} (${transferAmount.toFixed(2)} poin)`;
                logHistory(logMsg);
                setNotification({ message: `🃏 ${logMsg}`, type: 'success' });
                speak(`${loser} memasukkan Joker ke ${gainer}`);
                return true; 
            };

            const parseIndonesianNumber = (str) => {
                if (!str) return NaN;
                const map = {
                    'satu': 1, 'dua': 2, 'tiga': 3, 'empat': 4, 'lima': 5,
                    'enam': 6, 'tujuh': 7, 'delapan': 8, 'sembilan': 9, 'sepuluh': 10,
                    'sekali': 1
                };
                if (map[str] !== undefined) return map[str];
                const parsed = parseInt(str.replace(/[^0-9]/g, ''));
                return isNaN(parsed) ? NaN : parsed;
            };

            const processVoiceCommand = (text) => {
                const cleanText = text.replace(/[.,?!]/g, '').toLowerCase().trim();
                const words = cleanText.split(/\s+/);

                const getPlayer = (wordStr) => {
                    if (!wordStr) return null;
                    return players.find(p => p.toLowerCase() === wordStr || wordStr.includes(p.toLowerCase()) || p.toLowerCase().includes(wordStr));
                };

                if (cleanText.includes('masukin joker') || cleanText.includes('masukkan joker')) {
                    const delimiter = cleanText.includes('masukin joker') ? 'masukin joker' : 'masukkan joker';
                    const parts = cleanText.split(delimiter);
                    const loserStr = parts[0].trim().split(' ').pop();
                    const gainerStr = parts[1].trim().split(' ')[0];

                    const loser = getPlayer(loserStr);
                    const gainer = getPlayer(gainerStr);

                    if (gainer && loser) {
                        handleJokerTransfer(gainer, loser);
                        return;
                    }
                }

                if (cleanText.includes('win')) {
                    let isJoker = cleanText.includes('win joker');
                    let isWin2 = cleanText.includes('win langsung');
                    let winners = [];
                    let jokerHolders = [];
                    let buyers = [];

                    for (let i = 0; i < words.length; i++) {
                        const word = words[i];

                        if (word === 'win' && i > 0) {
                            const p = getPlayer(words[i-1]);
                            if (p && !winners.includes(p)) winners.push(p);
                        }

                        if (word === 'joker' && i > 0 && words[i-1] !== 'win' && words[i-1] !== 'masukin' && words[i-1] !== 'masukkan') {
                            const p = getPlayer(words[i-1]);
                            if (p && !jokerHolders.includes(p)) jokerHolders.push(p);
                        }

                        if (word === 'beli' && i > 0) {
                            const p = getPlayer(words[i-1]);
                            if (p) {
                                let amount = NaN;
                                const nextWord = words[i+1];
                                
                                if (nextWord === 'sekali') {
                                    amount = 1;
                                } else {
                                    const numValue = parseIndonesianNumber(nextWord);
                                    if (!isNaN(numValue)) {
                                        amount = numValue;
                                    }
                                }

                                if (!isNaN(amount)) {
                                    buyers.push({ name: p, amount: amount });
                                }
                            }
                        }
                    }

                    if (winners.length > 0) {
                        if (winners.length === 1) {
                            handleUpdateScore(winners[0], isJoker, isWin2, jokerHolders, buyers);
                        } else {
                            handleUpdateTeamScore(winners, jokerHolders, buyers);
                        }
                        return;
                    }
                }

                setNotification({message: "Format suara tidak dikenali: " + text, type: "error"});
            };

            const toggleListening = () => {
                if (isListening) {
                    setIsListening(false);
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setNotification({message: "Browser Anda tidak mendukung fitur Voice Recognition.", type: "error"});
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'id-ID';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    setIsListening(true);
                    setVoiceTranscript('🎤 Mendengarkan...');
                };

                recognition.onresult = (event) => {
                    const result = event.results[0][0].transcript;
                    setVoiceTranscript(`🔊 "${result}"`);
                    processVoiceCommand(result);
                };

                recognition.onerror = (event) => {
                    setNotification({message: "Error mikrofon: " + event.error, type: "error"});
                    setIsListening(false);
                    setVoiceTranscript('');
                };

                recognition.onend = () => {
                    setIsListening(false);
                    setTimeout(() => {
                        setVoiceTranscript(prev => prev.includes('Mendengarkan') ? '' : prev);
                    }, 4000);
                };

                recognition.start();
            };

            const handleResetScores = () => {
                setConfirmModal({
                    isOpen: true,
                    title: "Reset Skor?",
                    message: "Apakah Anda yakin ingin mereset semua skor pemain ke 0?",
                    onConfirm: () => {
                        if (!data) return;
                        const newData = JSON.parse(JSON.stringify(data));
                        players.forEach(p => {
                            if (newData[p]) newData[p].skor = 0;
                        });
                        saveData(newData);
                        logHistory("Semua skor direset ke 0.");
                        setNotification({ message: "🔄 Semua skor berhasil direset ke 0.", type: 'success' });
                    }
                });
            };

            const handleResetStakes = () => {
                setConfirmModal({
                    isOpen: true,
                    title: "Reset Poin?",
                    message: "Apakah Anda yakin ingin mereset semua patokan poin (N & J) ke 0?",
                    onConfirm: () => {
                        if (!data) return;
                        const newData = JSON.parse(JSON.stringify(data));
                        players.forEach(p => { 
                            if (newData[p]) {
                                newData[p].patokan_normal = 0; 
                                newData[p].patokan_joker = 0; 
                            }
                        });
                        saveData(newData);
                        logHistory("Semua patokan poin direset ke 0.");
                        setNotification({ message: "🧮 Semua patokan poin berhasil direset.", type: 'success' });
                    }
                });
            };

            const handleUndo = () => {
                let undoStack = getStack(BACKUP_KEY);
                if (undoStack.length === 0) { setNotification({ message: "❌ Tidak ada riwayat untuk di-undo.", type: 'error' }); return; }
                const previousData = undoStack.pop();
                let redoStack = getStack(REDO_KEY);
                if (data) redoStack.push(data);
                safeLocalStorage.setItem(BACKUP_KEY, JSON.stringify(undoStack));
                safeLocalStorage.setItem(REDO_KEY, JSON.stringify(redoStack));
                safeLocalStorage.setItem(DATA_KEY, JSON.stringify(previousData));
                setData(previousData);
                logHistory("Perubahan terakhir dibatalkan (undo).");
                setNotification({ message: "↩️ Undo berhasil!", type: 'success' });
            };

            const handleRedo = () => {
                let redoStack = getStack(REDO_KEY);
                if (redoStack.length === 0) { setNotification({ message: "❌ Tidak ada perubahan untuk di-redo.", type: 'error' }); return; }
                const nextData = redoStack.pop();
                let undoStack = getStack(BACKUP_KEY);
                if (data) undoStack.push(data);
                safeLocalStorage.setItem(REDO_KEY, JSON.stringify(redoStack));
                safeLocalStorage.setItem(BACKUP_KEY, JSON.stringify(undoStack));
                safeLocalStorage.setItem(DATA_KEY, JSON.stringify(nextData));
                setData(nextData);
                logHistory("Perubahan terakhir diulang (redo).");
                setNotification({ message: "➡️ Redo berhasil!", type: 'success' });
            };

            const handleShowDebug = () => {
                let detail = "";
                try {
                    const undoStack = getStack(BACKUP_KEY);
                    const prevData = undoStack.length > 0 ? undoStack[undoStack.length - 1] : {};
                    const currData = JSON.parse(safeLocalStorage.getItem(DATA_KEY) || "{}");
                    detail += `<div class='font-bold mb-2'>Detail perubahan skor round terakhir:</div>`;
                    players.forEach(p => {
                        const prev = prevData[p]?.skor ?? 0;
                        const curr = currData[p]?.skor ?? 0;
                        const diff = (curr - prev).toFixed(2);
                        detail += `<div>${p}: <span style='color:${diff>0?'green':diff<0?'red':'#444'}'>${prev.toFixed(2)} ➔ ${curr.toFixed(2)} (${diff>0?'+':''}${diff})</span></div>`;
                    });
                } catch (e) { detail = "Gagal parsing data debug."; }
                setDebugInfo(detail);
                setDebugModalVisible(true);
            };

            const handleSaveScores = (editScores) => {
                let hasError = false;
                for (const p of players) {
                    const val = editScores[p];
                    if (val === undefined || val === null || val === '' || isNaN(parseFloat(val))) {
                        hasError = true;
                        break;
                    }
                }
                let totalCheck = 0;
                players.forEach(p => { 
                    totalCheck += (parseFloat(editScores[p]) || 0); 
                });
                if (Math.abs(totalCheck) > 0.01) {
                    hasError = true;
                }
                if (hasError) {
                    setNotification({ message: `❌ Input salah! Pastikan semua kolom terisi angka dan total akumulasi seluruh skor adalah 0.`, type: 'error' });
                    return;
                }
                const newData = JSON.parse(JSON.stringify(data));
                players.forEach(p => { 
                    if (newData[p]) newData[p].skor = parseFloat(editScores[p]); 
                });
                saveData(newData);
                setNotification({message: "✏️ Skor berhasil diedit.", type: "success"});
                setEditModalVisible(false);
            };

            const handleSavePlayers = (editPlayers) => {
                let validPlayers = editPlayers.map(p => p.trim()).filter(p => p.length > 0);
                if (validPlayers.length < 2) { setNotification({message:"Minimal 2 pemain!", type:"error"}); return; }
                safeLocalStorage.setItem(PLAYER_KEY, JSON.stringify(validPlayers));
                setPlayers(validPlayers);
                let newData = getInitialData(validPlayers);
                validPlayers.forEach(p => { if (data && data[p]) newData[p] = {...data[p]}; });
                saveData(newData, false);
                setNotification({message: "✅ Nama & jumlah pemain berhasil diupdate!", type: "success"});
            };

            const handleSaveStakes = (stakes) => {
                const newData = JSON.parse(JSON.stringify(data));
                players.forEach(p => {
                    if (newData[p]) {
                        newData[p].patokan_normal = Math.round(parseFloat(stakes[p]?.n) || 0);
                        newData[p].patokan_joker = Math.round(parseFloat(stakes[p]?.j) || 0);
                    }
                });
                saveData(newData);
                setNotification({message: '✅ Nilai patokan berhasil diupdate!', type: 'success'});
            };

            const notificationColors = {
                info: 'bg-blue-100 text-blue-800',
                success: 'bg-green-100 text-green-800',
                error: 'bg-red-100 text-red-800'
            };

            return (
                <div className="max-w-2xl mx-auto">
                    {/* Elemen Audio Tersembunyi untuk mengatur Audio Focus di Android */}
                    <audio ref={audioRef} src={SILENT_AUDIO_URI} playsInline preload="auto" loop />

                    <Modal isVisible={helpModalVisible} onClose={() => setHelpModalVisible(false)} title="📘 Panduan & Voice Command">
                         <div className="text-left text-sm leading-relaxed text-gray-700 space-y-4">
                            <div className="bg-blue-50 p-3 rounded-lg border border-blue-200">
                                <h3 className="font-bold text-base text-[#4B0082] mb-1">🎤 Format Suara (Voice to Text)</h3>
                                <ul className="list-disc pl-4 space-y-1">
                                    <li><b>Menang Normal:</b> "[Nama] win" (cth: <i>"Budi win"</i>)</li>
                                    <li><b>Menang Tim:</b> "[Nama1] win [Nama2] win" (cth: <i>"Budi win Dede win"</i>)</li>
                                    <li><b>Menang x2:</b> "[Nama] win langsung"</li>
                                    <li><b>Menang dgn Joker Sendiri:</b> "[Nama] win joker"</li>
                                    <li><b>Penalti Joker (Musuh):</b> "[Pemenang] win [Kalah] joker" (cth: <i>"Budi win Dede joker"</i>)</li>
                                    <li><b>Catat Beli:</b> "[Pemenang] win [Kalah] beli sekali" (cth: <i>"Budi win Dede beli sekali"</i>)</li>
                                    <li><b>Transfer Joker:</b> "[Pemberi] masukin joker [Penerima]" (cth: <i>"Budi masukin joker Dede"</i>)</li>
                                </ul>
                                <p className="mt-2 text-xs text-gray-500">*Gunakan nama pemain yang jelas agar mudah dideteksi oleh Google Voice.</p>
                            </div>
                            <div>
                                <h3 className="font-bold text-base text-[#4B0082]">Set Patokan Poin</h3>
                                <p>Isi nilai Normal (N) dan Joker (J) untuk tiap pemain di menu Setting ⚙️ di bawah.</p>
                            </div>
                         </div>
                    </Modal>

                    <DebugModal isVisible={debugModalVisible} onClose={() => setDebugModalVisible(false)} info={debugInfo} />
                    <EditScoresModal isVisible={editModalVisible} onClose={() => setEditModalVisible(false)} data={data} players={players} onSave={handleSaveScores} />
                    <EditPlayersModal isVisible={editPlayersModalVisible} onClose={() => setEditPlayersModalVisible(false)} players={players} onSave={handleSavePlayers} />
                    <GoogleSheetsModal isVisible={sheetModalVisible} onClose={() => setSheetModalVisible(false)} currentUrl={sheetUrl} onSaveUrl={handleSaveSheetUrl} onSync={handleSyncToSheets} setNotification={setNotification} />
                    <ConfirmationModal isOpen={confirmModal.isOpen} title={confirmModal.title} message={confirmModal.message} onConfirm={confirmModal.onConfirm} onClose={() => setConfirmModal({ ...confirmModal, isOpen: false })} />

                    {/* Iframe Spotify Mode Melayang / Popup yang tersembunyi */}
                    <SpotifyPlayer 
                        embedUrl={SPOTIFY_EMBED_URL} 
                        spotifyUri={SPOTIFY_URI} 
                        onControllerReady={(controller) => { spotifyControllerRef.current = controller; }}
                        isPlaying={isSpotifyPlaying}
                        setIsPlaying={setIsSpotifyPlaying}
                        isVisible={showSpotify}
                        onClose={() => setShowSpotify(false)}
                    />

                    <div className="p-4 pb-12">
                        <div className="flex justify-between items-center mb-2">
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={toggleListening} 
                                    className={`w-12 h-12 rounded-full flex items-center justify-center text-xl font-bold shadow-lg transition-colors ${isListening ? 'mic-listening' : 'bg-white text-[#4B0082] hover:bg-[#5D3FD3] hover:text-white'}`} 
                                    title="Perintah Suara (Voice Command)"
                                >
                                    🎤
                                </button>

                                {/* Tombol Gabungan Spotify */}
                                <div className="flex bg-white rounded-full shadow-lg border border-gray-100 h-12">
                                    <button
                                        onClick={() => { if (spotifyControllerRef.current) { spotifyControllerRef.current.togglePlay(); setIsSpotifyPlaying(prev => !prev); } }}
                                        disabled={!spotifyControllerRef.current}
                                        className={`px-4 rounded-l-full flex items-center justify-center text-xl transition-colors ${isSpotifyPlaying ? 'bg-[#1DB954] text-white hover:bg-[#19a34a]' : 'text-[#4B0082] hover:bg-gray-50'}`}
                                        title="Play/Pause Spotify"
                                    >
                                        {isSpotifyPlaying ? '⏸️' : '▶️'}
                                    </button>
                                    <div className="w-px bg-gray-200"></div> {/* Divider */}
                                    <button
                                        onClick={() => setShowSpotify(true)}
                                        className="px-4 rounded-r-full flex items-center justify-center text-xl text-[#4B0082] hover:bg-gray-50 transition-colors"
                                        title="Buka Album/Playlist Spotify"
                                    >
                                        💿
                                    </button>
                                </div>
                            </div>

                            <div className="flex justify-end gap-2">
                                <button onClick={() => setIsVoiceEnabled(!isVoiceEnabled)} className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[#4B0082] text-lg font-bold shadow hover:bg-[#5D3FD3] hover:text-white transition-colors" title="Toggle Feedback Suara">
                                    {isVoiceEnabled ? '🔊' : '🔇'}
                                </button>
                                <button onClick={() => setVoiceAlertsEnabled(!voiceAlertsEnabled)} className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[#4B0082] text-lg font-bold shadow hover:bg-[#F59E0B] hover:text-white transition-colors" title="Toggle Voice Alerts">
                                    {voiceAlertsEnabled ? '🔔' : '🔕'}
                                </button>
                                <button onClick={() => setHelpModalVisible(true)} className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[#4B0082] text-lg font-bold shadow hover:bg-[#5D3FD3] hover:text-white transition-colors" title="Bantuan">📘</button>
                                <button onClick={handleShowDebug} className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[#4B0082] text-lg font-bold shadow hover:bg-[#5D3FD3] hover:text-white transition-colors" title="Debug">🐞</button>
                            </div>
                        </div>

                        {voiceTranscript && (
                            <div className="bg-gray-800 text-white p-3 rounded-lg mb-4 text-center text-sm shadow-inner break-words">
                                {voiceTranscript}
                            </div>
                        )}

                        {notification.message && (
                            <div className={`p-3 rounded-lg mb-4 text-center text-sm ${notificationColors[notification.type]}`}>
                                <p>{notification.message}</p>
                            </div>
                        )}
                        
                        <div className="flex items-center justify-center mb-4 relative">
                            <h1 className="text-3xl font-bold text-gray-800">📊 Tabel Skor</h1>
                            <button onClick={speakCurrentScores} className="w-12 h-12 rounded-full bg-white border border-[#5D3FD3] text-[#5D3FD3] text-xl flex items-center justify-center shadow-md hover:bg-purple-50 transition-colors absolute right-0" title="Baca Skor Sementara">🔊</button>
                        </div>
                        
                        <ScoreTable data={data} players={players} />
                        
                        <WinSection 
                            players={players} 
                            onUpdateScore={handleUpdateScore} 
                            onUpdateTeamScore={handleUpdateTeamScore}
                            setNotification={setNotification}
                        />
                        <JokerTransferSection players={players} onJokerTransfer={handleJokerTransfer} />
                        
                        {/* Kolom Tindakan Cepat */}
                        <ActionsSection 
                            onUndo={handleUndo} 
                            onRedo={handleRedo} 
                            onResetScores={handleResetScores} 
                            onResetStakes={handleResetStakes}
                        />

                        {/* Kolom Baru Pengaturan & Ekspor diletakkan di bawah Tindakan Cepat */}
                        <SettingsSection 
                            onEditScores={() => setEditModalVisible(true)}
                            onEditPlayers={() => setEditPlayersModalVisible(true)}
                            onEditStakes={() => setEditStakesModalVisible(true)}
                            onSaveToSheet={() => setSheetModalVisible(true)}
                        />
                    </div>

                    <EditStakesModal isVisible={editStakesModalVisible} onClose={() => setEditStakesModalVisible(false)} data={data} players={players} onSave={handleSaveStakes} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
